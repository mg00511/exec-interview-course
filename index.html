    {
      "heading": "Scenario 1 — Fintech Technical Strategy",
      "content": "You're interviewing for CTO at a fintech startup Series B, 50 engineers. They ask: \"What's your 3-year technical vision?\" You have 30 minutes. **The structure**: (1) **Hook (2 min)**: \"The finance industry is still dominated by 40-year-old legacy systems. The opportunity: companies trying to move fast get slowed down by compliance complexity and integration nightmare. We can own the full stack—payments, compliance, and developer ecosystem—that makes it easy for companies to build fintech products.\" (2) **Current state (3 min)**: \"Today, fintech builders have to piece together 5 vendors: payments processor, compliance platform, analytics, webhooks, developer docs. They're disconnected, slow to integrate, and fragile.\" (3) **Vision (5 min)**: \"In 3 years, we're the one platform where fintech builders come for everything. Payments infrastructure (real-time, global). Compliance automation (KYC, AML, reporting). Developer tools (SDKs, webhooks, observability). All integrated, all owned by us.\" (4) **Sequence (5 min)**: \"Year 1: payments foundation (real-time settlement, developer ergonomics). Year 2: compliance layer (we license compliance rules, automate reporting). Year 3: ecosystem (partner integrations, marketplace). This sequence matters because payments get us in the door, compliance creates stickiness, ecosystem creates defensibility.\" (5) **Trade-offs (3 min)**: \"What we're NOT doing: consumer fintech, crypto, geographic expansion beyond US. Why? Those are competitive with others or don't leverage our strengths.\" (6) **Proof points (3 min)**: \"Customers are asking for this—we've validated with 10 customers that integration is their biggest pain. Competitors (Stripe, Wise) own one dimension but not all three. Market size is $200B+ fintech infrastructure.\" (7) **Q&A (8 min)**: Be ready for pushback on competition, hiring, timeline. **How to practice**: Write it out. Time yourself. Tell it to peers. Get feedback on: Is it compelling? Is it realistic? Are you thinking like a CTO (vision + execution)?'"
    },
    {
      "heading": "Scenario 2 — Monolith Modernization at Scale",
      "content": "You're VP Eng at a 200-person company. Codebase is a 10-year-old monolith. Deploys take 4 hours. Teams are blocked on each other. You're asked: \"How would you modernize the architecture?\" This isn't just vision; it's strategic planning. **Structure**: (1) **Diagnosis**: \"I'd spend week 1 understanding: what's actually broken? Is it deploy time? Scalability? Team parallelization? Who's blocked by whom? We'd find the critical path—usually platform or core domain.\" (2) **Vision**: \"Migrate from monolith to domain-owned microservices. Each product team owns a service end-to-end.\" (3) **Sequence**: \"I wouldn't do a big rewrite. I'd extract services incrementally: 1) Extract the highest-value service first (usually payments, auth, or core logic). 2) Get one team on the new architecture. 3) They validate the pattern. 4) Extract next service. 5) Over 18 months, 60% of code is extracted. 70% stays in a skinny core.\" (4) **Org alignment**: \"This requires org changes. I'd reorganize around services, not features. Each service has a team.\" (5) **Risk mitigation**: \"The big risk is rewrite hell. I avoid this by: keeping old monolith and new services in parallel, extracting incrementally, having a clear ownership model, and measuring progress (services extracted, team autonomy, deploy velocity).\" (6) **Timeline**: \"18 months total. Payoff: deploys from 4 hours to 30 minutes, team parallelization improves 3x, cycle time improves 40%.\" **Practice angle**: Show you think about phasing, risk, org structure, not just technical purity."
    },
    {
      "heading": "Scenario 3 — Building AI/ML Capabilities",
      "content": "You're CTO at a SaaS company. You've been asked to invest in AI. You're asked: \"Build the tech strategy for AI integration.\" **Structure**: (1) **Framing**: \"AI isn't just a feature; it's a platform shift. We need to decide: are we building AI capabilities or integrating LLMs?\" (2) **Current state**: \"Today we have no ML infrastructure. We're either integrating OpenAI or building custom.\" (3) **Vision**: \"We become an AI-native product. Our value is in the data + the AI integration, not the model itself. We build: 1) Real-time inference infrastructure so we can run fast, 2) Feature pipeline for context, 3) Prompt management and testing.\" (4) **MVP path**: \"Month 1: integrate GPT-4 for core feature. Get customer feedback. Month 2-3: build feature pipeline so AI has better context. Month 4-6: build prompt management so we can iterate.\" (5) **Hiring**: \"We need: 1 ML infrastructure engineer, 1 AI product manager, 1 prompt engineer. We don't need to hire PhDs—we need pragmatists who can build quickly on LLMs.\" (6) **Risk**: \"Biggest risk: we become dependent on OpenAI. Mitigation: we keep our core differentiation in data and features, not in model. We can swap models if needed.\" (7) **Success metrics**: \"Users adopt AI features (>40% of users), engagement increases, feature velocity improves because AI handles certain tasks.\" **Practice angle**: Show you understand the strategy (LLM-native vs. building custom ML), sequencing (MVP first, infrastructure later), and risk."
    },
    {
      "heading": "Self-Assessment Rubric for Technical Vision",
      "content": "After presenting, grade yourself on: (1) **Hook (1-5)**: Is it interesting? Does it make the interviewer want to hear more? (2) **Structure (1-5)**: Is it easy to follow? Can they understand your thinking? (3) **Evidence (1-5)**: Is it grounded in data, customer feedback, market research? Or is it handwavy? (4) **Sequencing (1-5)**: Is your timeline realistic? Does the sequencing make sense (what has to happen first)? (5) **Handling questions (1-5)**: When they push back, are you defensive or adaptive? (6) **Connection to business (1-5)**: Is it clear why this vision matters? Revenue impact? Customer impact? (7) **Technical depth (1-5)**: Do you understand the technical details or are you vague? **Scoring**: 6-7: Strong vision, well-executed. 4-5: Okay vision, some gaps. 1-3: Needs work—either strategy is unclear or execution is weak. **Next steps**: If weak in any dimension, iterate. Get feedback. Tell it again."
    }

  "sections": [
    {
      "heading": "Scenario 1 — The Low-Morale Turnaround",
      "content": "You inherit a 100-person engineering org with high turnover (30% annually, down from 10%), low engagement (3.2/10 engagement survey), and declining shipping velocity (was 20 features/quarter, now 12). \"How would you diagnose and fix this?\" **Diagnosis phase (Week 1-2)**: (1) Exit interviews: \"Why are people leaving?\" Usually you'll hear: lack of career growth, unclear direction, bad manager, or product frustration. (2) Skip-level 1:1s: Talk to ICs directly. \"How's it really going? What's broken?\" (3) Manager health check: Are your 8 managers good? Is one manager causing turnover? (4) Technical audit: Is the codebase decaying? Is it frustrating to work on? (5) Culture audit: Read Glassdoor/Blind. What's the narrative? **Quick wins (Month 1)**: Address one thing immediately that doesn't require big change. Examples: (a) If pay is below market, fix it. Announce a pay adjustment. (b) If one manager is toxic, move them out or fire them. Signal that you're serious about culture. (c) If onboarding is broken, fix it. (d) If there's no career path clarity, create one. One quick win builds credibility. **Medium-term fixes (Months 2-6)**: (1) Leadership development: Are your directors/managers ready to lead growth? If not, hire or develop. (2) Clear communication: Weekly all-hands where you share strategy, progress, challenges. No politics. (3) Cultural reset: Revisit values. Maybe run a values workshop with the org. (4) Process improvement: If retrospectives are missing, start them. If planning is chaotic, add structure. (5) Hiring for growth: Rebuild with good people. **Long-term (Months 6-12)**: Sustain the changes. Monitor engagement and turnover. Goal: engagement back to 7+/10, turnover back to <10%, velocity recovering. **Timeline expectations**: You won't turn this around in 30 days. But within 6 months, people should feel like something is changing. Within 12 months, the org should be noticeably better."
    },
    {
      "heading": "Scenario 2 — Scaling 2x in 18 Months",
      "content": "You're at 100 engineers. Business needs 200 in 18 months. What's your plan? **Org structure (Month 1)**: Design for 200. \"What will this look like? If I have 200 engineers, how many teams? How many managers? How many directors?\" Example: 200 → ~50 people per director → 4 directors → 3-4 managers per director → 12-16 managers. Start organizing for this structure now, even with 100. This prevents chaos later. **Hiring plan (Ongoing)**: 100 hires in 18 months = ~5-6 per month. That's aggressive. You need: strong sourcers, good process, clear levels. (1) Where will you hire from? (2) What levels? (3) What's your hiring bar? (4) Can you hire that fast without degrading quality? **Manager pipeline (Month 1-3)**: You'll need ~25 people in management roles. You might have 8. You need 17 more. Options: (1) Promote high-potential ICs into first management roles (risky, needs coaching). (2) Hire experienced managers from outside. (3) Hybrid: promote some, hire some. **Culture preservation (Ongoing)**: Growth dilutes culture. Good companies end up homogeneous; great ones remain distinct. How? (1) Strong onboarding that emphasizes values. (2) Consistent hiring on values, not just skills. (3) Leadership that embodies culture visibly. (4) Skip-level meetings and culture surveys to catch drift early. (5) Not hiring too fast in one team (spreads people instead of clustering).  **Technical infrastructure (Ongoing)**: Can infrastructure handle 2x? Databases, cloud costs, CI/CD? Budget for this. **Execution reality**: Hiring 100 people well is harder than hiring 20 people well. Every process needs to scale. (1) Recruiting process—can sourcing handle 100 hires? (2) Interviewing—do you have enough interviewers trained? (3) Onboarding—can you integrate 100 people without them getting lost? (4) Culture—do new people understand how you work? Start planning these bottlenecks now."
    },
    {
      "heading": "Scenario 3 — Resolving Director Conflict",
      "content": "Director A (infrastructure) and Director B (product) are in conflict. Dependencies between their teams are suffering. Teams are tense. \"How do you handle this?\" **Understand root cause (Week 1)**: (1) Meet 1:1 with each director separately (not together). \"What's happening? What's your perspective?\" (2) Their teams: talk to a few people on each team. What's the real issue? (3) Sometimes it's personal (they don't like each other). Sometimes it's structural (their incentives are misaligned). **Structural vs. personal**: (A) **Structural misalignment**: Director A is measured on reliability (keeping systems up). Director B is measured on feature velocity (shipping fast). These incentives create tension naturally. No amount of relationship-building fixes this. You need to change incentives. Example: \"Both directors should be measured on: shipping fast AND reliably.\" (B) **Personal conflict**: They just don't get along. They need to work it out or you need to separate them. **The conversation (Week 2)**: Bring them together (you facilitate). NOT accusatory. \"I notice dependencies between your teams are feeling tense. I think we're misaligned on priorities. Let's align.\" Let them talk. Listen. **Resolution options**: (1) **Facilitate alignment**: \"Here's what I think we need to do. Let's agree on what matters.\" (2) **Change structure**: Maybe their teams shouldn't be as tightly coupled. Reduce handoffs. (3) **Change incentives**: Align their goals so they're not fighting. (4) **Separate them**: If it's personal and unfixable, move one team or one director. **Monitor (Ongoing)**: After fixing, check in monthly. \"How are dependencies going? How's collaboration?\" If it resets, you know the fix didn't stick and you need a different approach."
    },
    {
      "heading": "Self-Assessment Rubric",
      "content": "(1) **Diagnostic thinking**: Did you ask questions or jump to solutions? VPs diagnose first. (2) **People focus**: Did you think about morale, culture, career growth? Not just org chart. (3) **Structural thinking**: Did you use org design as a lever? Or just talk about it? (4) **Timeline realism**: Did you expect too much too fast? Or too little? Real change takes months. (5) **Execution mindset**: Can you actually execute this? What are the blockers? (6) **Ownership**: Did you take ownership or blame circumstances? (7) **Adaptation**: If your plan didn't work, how would you adapt?"
    }

      "heading": "Leadership & People Questions",
      "content": "These test your ability to develop and lead. **(1) \"Tell me about a time you developed a high-potential leader.\"** Look for: Did you invest in someone? Did they grow? Can you name specific things you coached on? Strong answer: \"Jane was a strong IC but had never led. I gave her a 3-person project to lead. I coached her weekly on decision-making, communication, handling conflict. After 6 months, she was ready for management. She's now a director.\" **(2) \"Give me an example of you making a hard people decision.\"** Look for: Did you move fast enough? Did you care about the person? Did you follow process? Strong answer: \"An engineer wasn't pulling their weight. I gave feedback, created a plan, gave them time. After 3 months, no improvement. I made the call to let them go. It was hard but right.\" **(3) \"Tell me about a time you had to rebuild trust in a team.\"** Look for: What broke trust? What did you do? Can you show measurable improvement? Strong answer: \"Previous leader left suddenly. Team was cynical. I spent month 1 just listening. I rebuilt trust through transparency, consistent follow-through, and celebrating wins.\" **(4) \"Tell me about a time you had to give critical feedback to a peer.\"** Look for: Did you do it directly? Did you care? Did they respond well? Strong answer: \"VP Product was committing to features we couldn't deliver. I told them directly: 'I respect you, but this timeline is setting us up to fail.' We worked it out.\" **(5) \"Tell me about a time you had to align multiple stakeholders.\"** Look for: Did you understand all parties? Did you find win-wins? Strong answer: \"We needed infrastructure investment from 5 teams. I understood each team's needs, found how infrastructure helped all of them, and got alignment.\""
    },
    {
      "heading": "Execution & Strategy Questions",
      "content": "**(1) \"Tell me about a major project you shipped. How did you manage complexity?\"** Look for: Did you break it into phases? Did you manage risk? Did you communicate? Strong answer: \"We shipped a mobile app while supporting web. I created two work streams in parallel, with a shared API contract. Weekly syncs kept them in sync. We shipped on time.\" **(2) \"Give me an example of you prioritizing when you had unlimited asks.\"** Look for: Did you have a clear framework? Did you say no? Could you explain trade-offs? Strong answer: \"We had 20 asks. I mapped them to OKRs. 5 aligned with OKRs; 15 didn't. I said no to the 15. That felt risky but turned out right.\" **(3) \"Tell me about a time you had to ship with constraints (time, budget, people).\"** Look for: Did you scope down or cut quality? How did you decide? Strong answer: \"We had 6 weeks to ship a feature. I broke it into MVP (must have) and Phase 2 (nice to have). Shipped MVP, got feedback, Phase 2 was informed by real usage.\" **(4) \"Describe a situation where your plan didn't work out.\"** Look for: What did you learn? How did you adapt? Strong answer: \"We planned a 6-month rewrite. Month 3, we realized it was the wrong approach. We stopped, pivoted to incremental refactoring. Better decision, faster outcome.\" **(5) \"Tell me about a time you had to balance speed and quality.\"** Look for: Did you make this explicit or just suffer? Strong answer: \"We chose to ship fast and accept technical debt, with a clear plan to pay it down. We hit the market window. We paid down debt over next quarter. Conscious trade-off, not reckless.\""
    },
    {
      "heading": "Culture & Inclusivity Questions",
      "content": "**(1) \"Tell me about a time you had to manage a difficult person.\"** Look for: Did you try to help first? Were you direct? Did you handle with dignity? Strong: \"An engineer was dismissive of others' ideas. I had a conversation about impact. They got defensive. Eventually they moved to a different role. Handled with respect.\" **(2) \"Give me an example of you building an inclusive team.\"** Look for: Did you think about this intentionally? Can you show diversity AND psychological safety? Strong: \"I was intentional about hiring for diversity. I also made sure we had psychological safety—anyone could speak up. Both hiring AND culture.\" **(3) \"Tell me about a time you had to adapt your leadership style.\"** Look for: Self-awareness. Recognition that different people need different things. Strong: \"I had a director who needed more autonomy, and one who needed more structure. I managed each differently.\" **(4) \"Describe a situation where you had to have a hard conversation.\"** Look for: Did you prepare? Did you stay respectful? Did you listen? Strong: \"I had to tell a director their promotion wasn't ready to happen. I came with specifics, listened to their reaction, offered coaching.\" **(5) \"Tell me about a time you had to support someone through a crisis.\"** Look for: Did you show empathy? Did you help practically? Strong: \"An engineer's parent died. I made space for them to grieve, made work flexible, and we covered their work. They came back when ready.\""
    },

      "heading": "Self-Evaluation After Interviews",
      "content": "For each answer, rate yourself 1-5 on: (1) **Did I tell a story or give abstract advice?** (Stories always beat abstractions.) (2) **Was it from my experience or secondhand?** (Your own experiences are always stronger.) (3) **Did I show the challenge and my thinking?** (Just the outcome is boring; show the decision-making.) (4) **Did I own the outcome?** (Whether success or failure, did I own it, or did I blame others?) (5) **Did I demonstrate growth or learning?** (What changed because of this experience?) (6) **Did I show respect for the other person/team?** (Even in conflicts, do you show you respected them?) (7) **Was I concise?** (2-3 minute stories are ideal. Rambling loses points.) **Scoring**: 6-7 per dimension: strong answer. 4-5: okay, needs polish. 1-3: weak, needs rethinking. If you're weak in any dimension, rewrite the story or practice it again."

  "id": 36,
  "phase": 7,
  "title": "The Turnaround Scenario",
  "subtitle": "Inheriting a struggling engineering org",
  "icon": "◭",
  "estimatedMinutes": 34,
  "sections": [
    {
      "heading": "Recognizing the Turnaround Situation",
      "content": "You're joining a company and the engineering org is struggling. Common signals: **(1) People crisis**: Turnover is 25%+ (compared to <15% healthy rate). Exit interview feedback is negative. People are burned out. **(2) Execution crisis**: Shipping is slow. Sprint velocity is declining. Deadlines are missed regularly. Features take 2-3x longer than industry standard. **(3) Technical crisis**: Codebase is fragile. Deploys are risky. Incidents are frequent. Paying down debt gets delayed every quarter. **(4) Trust crisis**: People don't believe leadership. Communication is poor. Silos between teams. **(5) Org crisis**: Structure is unclear or overly hierarchical. Promotion opportunities are limited. Managers are weak. (6) **Customer impact**: Customers are frustrated with bugs, slow feature velocity, or reliability. Some customers are at risk of churn. Your diagnosis: if you see 3+ of these, it's a turnaround situation. You're not just optimizing a healthy org; you're fixing a broken one."
    },
    {
      "heading": "The Diagnostic Phase (First 30 Days)",
      "content": "**(1) All-hands (Day 1-2)**: Get everyone in a room. You listen. \"I'm new, I'm here to understand what's working and what's not. I'll be visible. I want to learn from you.\" This builds credibility—you're not pretending to have all the answers. **(2) Exit interviews (Day 3-7)**: Talk to people who are leaving or have recently left. \"Why are you going? What could have been different?\" These are the most honest conversations you'll have. **(3) Skip-levels (Week 1-2)**: 1:1s with individual contributors. Not asking them to rat on their manager. Asking: \"How's it really going? What's broken? What are you proud of?\" You'll hear the real truth. **(4) Peer interviews (Week 1)**: Talk to VP Product, CFO, CEO. \"What are your frustrations with engineering?\" Understand their perspective. **(5) Org chart analysis**: How many layers? Ratio of managers to ICs? Are there unnatural silos? **(6) Technical deep-dive (Week 2)**: Look at code. Run a system. Talk to tech leads about constraints. What's the most fragile part? What's blocking velocity? **(7) Metrics review (Week 1-2)**: Turnover by team, velocity trend, incident frequency, average deploy time. See the data. (8) **Customer interviews (Week 2-3)**: \"What do you think of our engineering? Any issues?\" Often customers will tell you things engineering doesn't know. **(9) Create a diagnostic summary (Week 3)**: Write down your findings. Here's what's broken. Here's what's working. Here's the root causes. This becomes your roadmap."
    },
    {
      "heading": "The 90-Day Action Plan",
      "content": "**(Month 1: Diagnose & Quick Wins)**: (1) Complete diagnosis (done by week 3). (2) Pick 1-2 quick wins—things you can fix fast that build credibility. Examples: Fix a critical infrastructure issue (slow deploys, unreliable CI). Fix an obvious manager problem (replace a bad manager). Correct pay for a group that's underpaid. (3) Start new practices: Weekly all-hands where you share honestly. Monthly skip-level meetings. (4) Goal: People start seeing that something is changing. **(Month 2: Structural Changes)**: (1) Announce org changes (if needed). \"We're reorganizing from feature teams to platform teams because we were blocked.\" (2) Introduce new processes: Mandatory retrospectives. Clear planning cadence. (3) Hire or promote leaders if you identified weak managers. (4) Goal: New structure is in place, people understand why. **(Month 3: Stabilization & Measurement)**: (1) Review progress against baseline. Turnover rate improving? Velocity improving? Morale improving? (2) Communicate results. \"Here's what we've changed. Here's the impact.\" (3) Create a year-1 roadmap. \"Phase 1 (now): Stabilize. Phase 2 (next quarter): Improve. Phase 3: Scale.\" (4) Goal: People believe the turnaround is real. **(Beyond Month 3)**: Sustain. Monitor metrics. Keep communicating. True turnarounds take 6-12 months. Don't expect everything to be fixed in 90 days."
    },
    {
      "heading": "Communicating the Turnaround Narrative",
      "content": "**(The Month 1 All-Hands)**: \"I've spent my first month listening. Here's what I heard—[specific problems without blaming]. I also heard about what's working—[strengths]. Here's what I'm going to focus on: [priorities]. I won't fix everything in 30 days. But I'm committed to [concrete action]. I'll keep you updated on progress monthly.\" Be specific. Be honest. Don't oversell. **(Monthly updates)**: Share progress against your stated priorities. \"Month 1 goal: improve deploy time. We reduced it from 4 hours to 2.5 hours.\" Celebrate progress, even small. **(Handling resistance)**: Some people will be cynical (they've seen failed turnarounds before). Earn trust through action, not words. **(When things are hard)**: Sometimes the turnaround stalls. You hit resistance. People are tired. You communicate: \"This is hard. I know. But we're making progress. Here's why it matters. Here's what I need from you.\" Honesty builds credibility."
    }
  ],

      "heading": "Understanding the AI Landscape & Your Options",
      "content": "AI is no longer optional—it's infrastructure. As a VP/CTO, you need to decide: do we build AI capabilities or integrate external models? **The build option**: You hire ML engineers, build your own models, own the data pipeline, maintain the models. Investment: $2-5M+/year for 10 engineers plus infrastructure. Benefit: Proprietary models, complete control, defensibility. Risk: Slow, expensive, hard to hire ML talent. **The integrate option**: You use GPT-4, Claude, open-source models like Llama. You focus on prompt engineering, RAG (retrieval-augmented generation), fine-tuning. Investment: $100K-500K/year for infrastructure and a few ML engineers. Benefit: Fast to market, cheap, no model training burden. Risk: Dependent on external providers, less defensibility, commodity models. **The hybrid option**: Build for your core differentiator, integrate for everything else. Most companies do this. **Interview tip**: When asked about AI strategy, show you understand these options and can make conscious trade-offs based on your company's stage, talent, and ambition."
    },
    {
      "heading": "Building Your AI Roadmap",
      "content": "If you're adding AI to your product: **(Phase 1: MVP with external models)** (Weeks 1-4): Pick one high-value use case. Use GPT-4 or Claude. Build a quick MVP. Get customer feedback. Cost: ~$50K to build, $1-2K/month in API costs. **(Phase 2: Optimize and operationalize)** (Months 2-3): Based on feedback, refine prompts. Build evaluation frameworks so you know quality. Start thinking about cost optimization (maybe you switch to GPT-3.5 for some uses, or open-source models). **(Phase 3: Build internal capability)** (Months 4-6): Hire 1-2 ML engineers. Build your own fine-tuned model for your specific use case. Build infrastructure for prompt management, evaluation, and model serving. **(Phase 4: Scale and differentiate)** (Months 6+): Expand AI across product. Build unique capabilities (maybe recommendation system, maybe real-time personalization) that competitors can't easily replicate. **ROI thinking**: Month 1 you spend $50K and get an MVP. Month 2-3 you iterate. Month 4 you hire someone ($120K/year) and start investing. By month 6-12, if AI is working, you're spending $500K/year but potentially generating $5M+ in additional revenue. That's your business case."
    },
    {
      "heading": "Responsible AI & Risk Management",
      "content": "AI can amplify problems if not managed well. **Bias risks**: AI models can perpetuate or amplify biases in training data. If your data is biased (e.g., historical hiring data where women were hired less), the model learns that bias. **Mitigation**: Audit training data. Test for bias across demographics. Monitor predictions over time. **Privacy risks**: If you're using customer data to train models, ensure compliance (GDPR, CCPA, etc.). **Mitigation**: Anonymize data. Get explicit consent. Build privacy-preserving approaches (federated learning, differential privacy). **Hallucination risks**: LLMs can confabulate (make up information that sounds plausible but is false). If your product relies on accuracy (medical, legal, financial), this is risky. **Mitigation**: Add human review. Use RAG (retrieval-augmented generation) so models cite sources. Set confidence thresholds. **Security risks**: AI models can be attacked (adversarial examples, prompt injection). **Mitigation**: Monitor for attacks. Build robustness. **Interview angle**: Show you understand AI isn't risk-free and you take responsibility seriously."

  "sections": [
    {
      "heading": "Why D&I Matters for Engineering Leaders",
      "content": "Diverse teams make better decisions. Inclusive teams retain better. Belonging cultures move faster. **The data**: (1) Diverse teams have 19% higher innovation indices (BCG research). (2) Inclusive organizations have 3x the financial performance (Deloitte). (3) Women in leadership: companies with women in executive roles outperform on profitability. (4) But: diversity without inclusion creates backlash. If you hire diverse people but don't include them, they leave. **Why it matters for interviews**: Companies are evaluating you on this. They want to know: Do you understand the business case? Can you build an inclusive org? Will you be an advocate or indifferent?"
    },
    {
      "heading": "Building Inclusive Hiring & Retention",
      "content": "**Hiring practices**: (1) **Diverse candidate sourcing**: Default recruiting sources (ivy league referrals, specific networks) create homogeneous slates. Expand: HBCUs, women-focused tech communities, underrepresented communities. (2) **Structured interviews**: Unstructured interviews have high bias. Use structured rubrics. (3) **Diverse interview panels**: If all interviewers are from the majority group, bias can slip through. Include diverse people on interview panels. (4) **Remove unnecessary barriers**: \"Requires 10 years experience\" can exclude people who had non-traditional paths. Be specific: \"Requires 10 years building distributed systems\" is better. **Retention practices**: (1) **Sponsorship, not just mentorship**: Mentorship is advice. Sponsorship is advocacy—helping someone get opportunities. Women/underreps need both but often only get mentorship. (2) **Inclusive culture signals**: Do people from underrepresented groups see people like them in leadership? Can people be their authentic selves? (3) **Pay equity**: Audit your pay across demographics. Men/women, majority/underreps for the same role should make similar money. (4) **Growth opportunities**: Are underreps being promoted at the same rates? If not, why? (5) **Psychological safety**: People need to feel they can speak up without retaliation. This is foundational."
    },

  "icon": "📖",

    {
      "heading": "The Architecture of a Failure Story",
      "content": "Everyone fails. The question is: how do you talk about it? **Strong failure stories have this structure**: (1) **The setup**: Context and stakes. \"I was Director at a 50-person company. We were growing fast.\" (2) **The decision**: What did you decide/choose? \"I decided to reorganize from feature teams to platform teams because I thought it would help.\" (3) **Why you believed it**: What was your reasoning? \"I thought we'd reduce dependencies.\" (4) **How it went wrong**: What happened? \"We reorganized, but teams felt lost. Confusion lasted 3 months. Velocity dropped.\" (5) **The consequence**: What was the impact? \"We delayed Q4 roadmap by 6 weeks. People were frustrated.\" (6) **What you learned**: The real insight. \"I learned that reorganization takes longer than you think AND that communication during change is critical. Next time, I'd pilotmore before going org-wide.\" (7) **What you did differently**: How did you apply it? \"At my next company, we piloted a new process with one team first, got feedback, then scaled.\" **What makes this strong**: You own it. You don't blame circumstances or people. You extract real learning. You show you changed."
    },
    {
      "heading": "Framing Setbacks & Difficult Transitions",
      "content": "Sometimes you didn't fail; circumstances were hard. **How to frame these**: (1) **Got laid off**: \"The company ran out of runway during the downturn. We'd hired aggressively and the market shift was sharp. I was part of a round of layoffs.\" This is not your failure. State facts, move on. (2) **Left on bad terms**: \"We had different visions about direction. I thought we should invest in platform; leadership wanted short-term velocity. I wasn't aligned anymore, so I left.\" Neutral, not bitter. (3) **Missed a major goal**: \"We were aiming for 200 ARR, landed at 120. Market didn't behave as expected. We learned [specific insight] which informed our next strategy.\" Honest about the miss, clear about learning. (4) **Inherited a mess**: \"I came into an org with high turnover and declining velocity. That wasn't my fault, but it was my responsibility to fix.\" Own the response even if you didn't create the problem."
    },
    {
      "heading": "The Postmortem-as-Growth Story",
      "content": "Postmortems (blameless post-incident reviews) are moments of truth. **The story**: \"After a major outage, instead of blaming the on-call engineer, we did a blameless postmortem. Everyone contributed to the root cause analysis. We realized it was a systems issue, not a person issue. We fixed the system. I learned that blame kills learning. Blameless postmortems create better teams.\" This story shows: (1) You don't blame people. (2) You focus on systems. (3) You learn and improve. (4) You care about team health, not punishment. **Why it works in interviews**: Interviewers see a leader who's thoughtful about failure, who doesn't scapegoat, who builds trust."
    },
    {
      "heading": "Vulnerability & Authenticity",
      "content": "The best failure stories show vulnerability without desperation. **(1) Vulnerability without desperation**: \"I made a bad hire. It was a senior engineer I was excited about. They didn't work out. I should have done more diligence.\" (This shows humility and learning, not desperation.) **vs.** \"I make mistakes all the time. I'm basically incompetent.\" (This is too much.) **(2) The balance**: Share real failures, but also show that you've grown. You're not still making the same mistakes. **(3) Why it works**: Interviewers are humans. They've failed too. Vulnerability builds connection. But they also need to know you learn and improve. **(4) When to use vulnerability**: In behavioral rounds, absolutely. In technical rounds, less so (technical credibility matters more). In organizational design questions, show judgment and nuance."

// ============================================================================
// Utility Functions
// ============================================================================

function renderContent(text, styles, c) {
  if (!text) return null;

  // Split text into chunks by bold-header patterns like **Something:** or **Something**
  // Bold headers at the start of a section become accent-colored section headers
  const chunks = [];
  const headerPattern = /\*\*([^*]+)\*\*:?\s*/g;
  let lastIndex = 0;
  let match;
  const matches = [];

  while ((match = headerPattern.exec(text)) !== null) {
    matches.push({ index: match.index, header: match[1], fullMatch: match[0], end: match.index + match[0].length });
  }

  if (matches.length === 0) {
    // No bold headers found, render as regular paragraphs
    return text.split('\n\n').map((para, i) => {
      const parts = para.split(/\*\*(.*?)\*\*/g);
      return React.createElement(
        'p',
        { key: i, style: styles.bodyText },
        ...parts.map((part, j) =>
          j % 2 === 1
            ? React.createElement('strong', { key: j, style: { color: c.headingText, fontWeight: 700 } }, part)
            : part
        )
      );
    });
  }

  // Extract intro text before first bold header
  const introText = text.substring(0, matches[0].index).trim();
  if (introText) {
    chunks.push({ type: 'intro', text: introText });
  }

  // Extract each bold-header block
  for (let m = 0; m < matches.length; m++) {
    const contentStart = matches[m].end;
    const contentEnd = m + 1 < matches.length ? matches[m + 1].index : text.length;
    const content = text.substring(contentStart, contentEnd).trim();
    chunks.push({ type: 'section', header: matches[m].header, content: content });
  }

  return chunks.map((chunk, i) => {
    if (chunk.type === 'intro') {
      const parts = chunk.text.split(/\*\*(.*?)\*\*/g);
      return React.createElement(
        'p',
        { key: i, style: { ...styles.bodyText, marginBottom: '24px' } },
        ...parts.map((part, j) =>
          j % 2 === 1
            ? React.createElement('strong', { key: j, style: { color: c.headingText, fontWeight: 700 } }, part)
            : part
        )
      );
    }

    // Section paragraph with accent-colored bold header
    const contentParts = chunk.content.split(/\*\*(.*?)\*\*/g);
    const headerEl = React.createElement(
      'strong',
      { style: { color: c.accent, fontWeight: 700 } },
      chunk.header
    );

    return React.createElement(
      'p',
      { key: i, style: { ...styles.bodyText, marginBottom: '24px' } },
      headerEl,
      ': ',
      ...contentParts.map((part, j) =>
        j % 2 === 1
          ? React.createElement('strong', { key: j, style: { color: c.headingText, fontWeight: 700 } }, part)
          : part
      )
    );
  });
}

function calculateProgress(state) {
  const totalModules = modules.length;
  const completedModules = modules.filter(mod => state[mod.id]?.quizPassed).length;
  return totalModules > 0 ? Math.round((completedModules / totalModules) * 100) : 0;
}

function getTotalMinutes(mods) {
  return mods.reduce((acc, mod) => acc + (mod.estimatedMinutes || 0), 0);
}

function getStatusIcon(moduleId, state) {
  const moduleState = state[moduleId];
  if (!moduleState) return '○';
  if (moduleState.quizPassed) return '✓';
  if (moduleState.completedSections && moduleState.completedSections.length > 0) return '◆';
  return '○';
}

// ============================================================================
// GitHub Sync
// ============================================================================

const ghRepo = "mg00511/exec-interview-course";
const ghFile = "progress.json";

function githubSync(token, progress) {
  var headers = { "Authorization": "token " + token, "Accept": "application/vnd.github+json" };
  return fetch("https://api.github.com/repos/" + ghRepo + "/contents/" + ghFile, { headers: headers })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(existing) {
      var body = {
        message: "Sync progress",
        content: btoa(JSON.stringify(progress, null, 2))
      };
      if (existing && existing.sha) body.sha = existing.sha;
      return fetch("https://api.github.com/repos/" + ghRepo + "/contents/" + ghFile, {
        method: "PUT", headers: headers, body: JSON.stringify(body)
      });
    })
    .then(function(r) { return r.ok; })
    .catch(function() { return false; });
}

function githubLoad(token) {
  return fetch("https://api.github.com/repos/" + ghRepo + "/contents/" + ghFile, {
    headers: { "Authorization": "token " + token, "Accept": "application/vnd.github+json" }
  })
  .then(function(r) { return r.ok ? r.json() : null; })
  .then(function(data) {
    if (data && data.content) return JSON.parse(atob(data.content));
    return null;
  })
  .catch(function() { return null; });
}

function VPCTOInterviewPrep() {
  const [state, setState] = React.useState(() => {
    const saved = localStorage.getItem('vpcto-interview-prep-progress');
    return saved ? JSON.parse(saved) : {};
  });

  const [theme, setTheme] = React.useState(() => {
    const saved = localStorage.getItem('vpcto-theme');
    return saved || 'dark';
  });

  const [activePhase, setActivePhase] = React.useState(1);
  const [activeModule, setActiveModule] = React.useState(() => {
    const firstModule = modules.find((m) => m.phase === 1);
    return firstModule ? firstModule.id : modules[0]?.id;
  });
  const [activeSection, setActiveSection] = React.useState(0);
  const [sidebarOpen, setSidebarOpen] = React.useState(false);
  const [isMobile, setIsMobile] = React.useState(() => window.innerWidth <= 800);
  const [showQuiz, setShowQuiz] = React.useState(false);
  const [showSync, setShowSync] = React.useState(false);
  const [syncToken, setSyncToken] = React.useState('');
  const [syncStatus, setSyncStatus] = React.useState('');

  // Get theme colors and styles
  const colors = getThemeColors(theme);
  const styles = getStyles(colors);

  const currentModule = modules.find((m) => m.id === activeModule);
  const phasedModules = modules.filter((m) => m.phase === activePhase);
  const progress = calculateProgress(state);
  const totalMinutes = getTotalMinutes(modules);

  // Track mobile viewport
  React.useEffect(() => {
    const handleResize = () => setIsMobile(window.innerWidth <= 800);
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  // Save progress to localStorage and auto-push to GitHub
  React.useEffect(() => {
    try {
      localStorage.setItem('vpcto-interview-prep-progress', JSON.stringify(state));
      const token = localStorage.getItem('vpcto-gh-token');
      if (token && Object.keys(state).length > 0) {
        githubSync(token, state);
      }
    } catch(e) {}
  }, [state]);

  // Save theme to localStorage
  React.useEffect(() => {
    localStorage.setItem('vpcto-theme', theme);
  }, [theme]);

  function updateModuleState(moduleId, updates) {
    setState((prev) => ({
      ...prev,
      [moduleId]: { ...prev[moduleId], ...updates },
    }));
  }

  function toggleSectionComplete(moduleId, sectionIndex) {
    const currentCompleted = state[moduleId]?.completedSections || [];
    const isCompleted = currentCompleted.includes(sectionIndex);
    const newCompleted = isCompleted
      ? currentCompleted.filter((i) => i !== sectionIndex)
      : [...currentCompleted, sectionIndex];
    updateModuleState(moduleId, { completedSections: newCompleted });
  }

  function isSectionComplete(moduleId, sectionIndex) {
    return (state[moduleId]?.completedSections || []).includes(sectionIndex);
  }

  // Load sync token on mount and auto-pull
  React.useEffect(() => {
    try {
      const token = localStorage.getItem('vpcto-gh-token');
      if (token) {
        setSyncToken(token);
        githubLoad(token).then(function(remote) {
          if (remote) {
            const localCount = Object.keys(state).length;
            const remoteCount = Object.keys(remote).length;
            if (remoteCount > localCount) {
              setState(remote);
              localStorage.setItem('vpcto-interview-prep-progress', JSON.stringify(remote));
            }
          }
        });
      }
    } catch(e) {}
  }, []);

  function handleSyncSetup() {
    if (!syncToken) return;
    localStorage.setItem('vpcto-gh-token', syncToken);
    setSyncStatus('syncing');
    githubLoad(syncToken).then(function(remote) {
      if (remote && Object.keys(remote).length > Object.keys(state).length) {
        setState(remote);
        localStorage.setItem('vpcto-interview-prep-progress', JSON.stringify(remote));
        setSyncStatus('pulled');
      } else {
        return githubSync(syncToken, state).then(function(ok) {
          setSyncStatus(ok ? 'pushed' : 'error');
        });
      }
    }).catch(function() { setSyncStatus('error'); });
  }

  function handleSyncPull() {
    const token = localStorage.getItem('vpcto-gh-token');
    if (!token) return;
    setSyncStatus('syncing');
    githubLoad(token).then(function(remote) {
      if (remote) {
        setState(remote);
        localStorage.setItem('vpcto-interview-prep-progress', JSON.stringify(remote));
        setSyncStatus('pulled');
      } else {
        setSyncStatus('no-remote');
      }
    }).catch(function() { setSyncStatus('error'); });
  }

  // Close sidebar on route change
  React.useEffect(() => {
    setSidebarOpen(false);
    setShowQuiz(false);
    setActiveSection(0);
  }, [activeModule, activePhase]);

  // ========================================================================

  function renderMainContent() {
    if (!currentModule) {
      return React.createElement('div', { style: { textAlign: 'center', marginTop: '60px' } }, 'Loading...');
    }

    const moduleIndex = modules.findIndex((m) => m.id === activeModule) + 1;

    return React.createElement(
      'div',
      { style: { maxWidth: '780px' } },
      React.createElement(
        'div',
        { style: styles.moduleHeader },
        React.createElement('div', { style: styles.moduleNumber }, `Module ${moduleIndex} of ${modules.length}`),
        React.createElement('h1', { style: styles.moduleTitle }, currentModule.title),
        React.createElement('h2', { style: styles.moduleSubtitle }, currentModule.subtitle)
      ),
      React.createElement(
        'div',
        { style: styles.sectionTabs },
        ...currentModule.sections.map((section, i) =>
          React.createElement(
            'button',
            {
              key: i,
              style: {
                ...styles.sectionTab,
                ...(activeSection === i && !showQuiz && styles.sectionTabActive),
              },
              onClick: () => {
                setShowQuiz(false);
                setActiveSection(i);
              },
            },
            React.createElement(
              'span',
              {
                style: {
                  ...styles.sectionDot,
                  backgroundColor: isSectionComplete(activeModule, i) ? colors.accent : colors.muted,
                },
              }
            ),
            section.heading
          )
        ),
        React.createElement(
          'button',
          {
            style: {
              ...styles.sectionTab,
              ...(showQuiz && styles.sectionTabActive),
            },
            onClick: () => setShowQuiz(true),
          },
          React.createElement(
            'span',
            {
              style: {
                ...styles.sectionDot,
                backgroundColor: state[activeModule]?.quizPassed ? colors.accent : colors.muted,
              },
            }
          ),
          'Quiz'
        )
      ),
      renderSectionContent()
    );
  }

  // ========================================================================
  // Render Sidebar
  // ========================================================================

  function renderSidebar() {
    return React.createElement(
      'div',
      { style: { ...styles.sidebar, left: (isMobile && !sidebarOpen) ? '-280px' : '0' } },
      React.createElement(
        'div',
        { style: styles.sidebarHeader },
        React.createElement('div', { style: styles.logoMark }, '◆'),
        React.createElement('div', { style: styles.courseTitle }, 'VP/CTO Interview Prep'),
        React.createElement('div', { style: styles.courseSubtitle }, 'Executive Course')
      ),
      React.createElement('div', { style: styles.progressLabel }, `${progress}% complete · ${modules.filter((m) => state[m.id]?.quizPassed).length}/${modules.length} modules`),
      React.createElement('div', { style: styles.progressBar }, React.createElement('div', { style: { ...styles.progressBarFill, width: `${progress}%` } })),
      React.createElement(
        'select',
        {
          style: styles.phaseDropdown,
          value: activePhase,
          onChange: (e) => {
            const phase = Number(e.target.value);
            setActivePhase(phase);
            const firstModuleInPhase = modules.find((m) => m.phase === phase);
            if (firstModuleInPhase) {
              setActiveModule(firstModuleInPhase.id);
            }
          },
        },
        ...[1, 2, 3, 4, 5, 6, 7].map((phase) =>
          React.createElement('option', { key: phase, value: phase }, `P${phase} — ${phaseNames[phase]}`)
        )
      ),
      React.createElement(
        'div',
        { style: styles.moduleList },
        phasedModules.map((mod) =>
          React.createElement(
            'div',
            {
              key: mod.id,
              style: {
                ...styles.moduleItem,
                ...(activeModule === mod.id && styles.moduleItemActive),
              },
              onClick: () => setActiveModule(mod.id),
              onMouseEnter: (e) => {
                if (activeModule !== mod.id) {
                  e.currentTarget.style.backgroundColor = colors.hoverBg;
                  e.currentTarget.style.borderColor = colors.border;
                }
              },
              onMouseLeave: (e) => {
                if (activeModule !== mod.id) {
                  e.currentTarget.style.backgroundColor = 'transparent';
                  e.currentTarget.style.borderColor = colors.border;
                }
              },
            },
            React.createElement('div', { style: styles.moduleIcon }, mod.icon),
            React.createElement(
              'div',
              { style: styles.moduleItemContent },
              React.createElement('div', { style: styles.moduleItemTitle }, mod.title),
              React.createElement(
                'div',
                { style: styles.moduleItemMeta },
                state[mod.id]?.quizPassed ? 'Quiz passed' : 'Quiz pending',
                ' · ',
                mod.estimatedMinutes,
                ' min'
              )
            ),
            React.createElement('div', { style: { ...styles.statusIcon, color: state[mod.id]?.quizPassed ? '#4caf50' : colors.muted } }, getStatusIcon(mod.id, state))
          )
        )
      ),
      React.createElement(
        'div',
        { style: styles.syncSection },
        React.createElement(
          'div',
          { style: { display: 'flex', gap: '8px', alignItems: 'center' } },
          !showSync ? React.createElement(
            'button',
            {
              style: { ...styles.syncButton, flex: 1 },
              onClick: () => setShowSync(true),
            },
            localStorage.getItem('vpcto-gh-token') ? '✓ Synced' : '☁ Sync'
          ) : React.createElement(
            'button',
            {
              style: { ...styles.syncButton, flex: 1 },
              onClick: () => setShowSync(false),
            },
            '✕ Close sync'
          ),
          React.createElement(
            'button',
            {
              style: styles.themeToggleIcon,
              onClick: () => setTheme(theme === 'dark' ? 'light' : 'dark'),
            },
            theme === 'dark' ? '☀' : '☽'
          )
        ),
        showSync && React.createElement(
          'div',
          { style: { ...styles.syncPanel, marginTop: '10px' } },
          React.createElement('div', { style: { fontSize: '12px', color: colors.muted, marginBottom: '8px', fontFamily: "'Fira Code', monospace" } }, 'GitHub token (repo scope):'),
          React.createElement('input', {
            type: 'password',
            value: syncToken,
            onChange: (e) => setSyncToken(e.target.value),
            placeholder: 'ghp_...',
            style: styles.syncInput,
          }),
          React.createElement(
            'div',
            { style: { display: 'flex', gap: '6px', marginTop: '8px' } },
            React.createElement('button', { onClick: handleSyncSetup, style: styles.syncActionBtn }, 'Save & Sync'),
            React.createElement('button', { onClick: handleSyncPull, style: styles.syncActionBtn }, 'Pull')
          ),
          syncStatus && React.createElement('div', {
            style: { fontSize: '11px', marginTop: '6px', fontFamily: "'Fira Code', monospace", color: syncStatus === 'error' ? '#D4766A' : '#5CB88A' }
          },
            syncStatus === 'syncing' ? 'Syncing...' : syncStatus === 'pushed' ? 'Progress pushed to GitHub' : syncStatus === 'pulled' ? 'Progress pulled from GitHub' : syncStatus === 'error' ? 'Sync failed — check token' : syncStatus === 'no-remote' ? 'No remote progress found' : ''
          )
        )
      )
    );
  }

  // ========================================================================
  // Main Render
  // ========================================================================

  return React.createElement(
    'div',
    { style: styles.container },
    isMobile && sidebarOpen && React.createElement('div', { style: styles.sidebarMobile, onClick: () => setSidebarOpen(false) }),
    React.createElement(
      'button',
      {
        style: { ...styles.menuToggleBtn, display: isMobile ? 'block' : 'none' },
        onClick: () => setSidebarOpen(!sidebarOpen),
      },
      sidebarOpen ? '✕' : '☰'
    ),
    renderSidebar(),
    React.createElement(
      'div',
      { style: { ...styles.mainContent, ...(isMobile ? { marginLeft: 0, padding: '60px 20px 40px' } : {}) } },
      renderMainContent()
    )
  );
}

// ============================================================================
// Render to DOM
// ============================================================================

ReactDOM.render(React.createElement(VPCTOInterviewPrep), document.getElementById('root'));

    </script>
</body>
</html>
