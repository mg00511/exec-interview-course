      "heading": "What to Avoid",
      "content": "First-time VPs often make predictable mistakes in the first 90 days. Avoid these. **Avoid major restructures in month 1**: You don't have enough information. You'll make bad calls. \"I noticed Director A isn't great at people management. Let me move them.\" Bad idea. You haven't talked to their team yet. They might be unfairly blamed. Same with firing people. Wait until day 60-90. By then you have real data. **Avoid announcing strategy changes immediately**: \"The previous VP's roadmap is wrong. We're pivoting.\" Slow down. Maybe the previous VP's roadmap is right for reasons you don't understand yet. Listen first. Decide later. **Avoid being visibly disrespectful to the previous regime**: The team still has emotional investment in their old VP. \"Things were broken here\" = \"you all failed.\" Instead: \"I see what you built. I'm learning the decisions that led here.\" **Avoid the \"I'm the expert\" trap**: You're not. You're the new leader learning the business. \"I've done this before at my last company\" might be true, but different companies are different. You'll earn credibility faster by asking than by pronouncing. **Avoid skipping all-hands and team interaction**: Some new VPs dive deep into 1-on-1s but skip visibility with the full org. Do all-hands monthly. Do skip-level lunch sessions. Be visible and accessible. **Avoid pretending to know technical decisions**: If you don't understand the architecture, say so. \"Can someone walk me through the infrastructure?\" Credibility comes from honest questions, not fake confidence. **Avoid changing processes immediately**: \"Your agile is wrong. We're doing this instead.\" Too fast. By day 60, you'll have opinions. By day 90, you can change processes. But not day 7. **Avoid siloing yourself with leadership**: You'll get one perspective (the director's perspective). Spend 30% of your time with ICs. They'll tell you the real truth. **Avoid the \"I have a plan\" announcement without data**: Wait until day 60. Then share your plan with data backing it. \"Here's what I'm seeing [data]. Here's my assessment. Here's what I propose.\" **Avoid moving slower than necessary**: By day 60, you should have opinions. By day 90, you should be acting on them. If you're still \"learning\" at day 90, something's wrong. You should have achieved 3-4 90-day priorities by then. **The balance**: Listen hard for 30 days. Think hard for 30 days. Act hard for 30 days. By day 90, you've built credibility through action, not theory."

      "heading": "Tailoring to Each Company",
      "content": "Your 90-day priorities vary dramatically by company stage and situation. Tailor accordingly. **Early stage (pre-Series A, <20 engineers)**: **The challenge**: You're often the first VP. Infrastructure is minimal. The founder is a strong engineer but doesn't know how to scale. **Priorities**: (1) Hiring 3-5 great engineers (you are the magnet). (2) Establishing basic infrastructure (CI/CD, monitoring). (3) Building a culture that attracts talent. (4) Helping the founder become a CEO. **Pitfall**: Moving too slowly on hiring. Your growth is capped by your ability to recruit. **Growth stage (Series B-C, 20-100 engineers)**: **The challenge**: You have talent but org structure is chaotic. People wear multiple hats. No clear systems. **Priorities**: (1) Building a director/manager layer (you can't scale managing 20 people). (2) Clarifying technical standards and architecture. (3) Establishing processes (deployment, on-call, code review). (4) Identifying your top 10% talent (they'll be your future leaders). **Pitfall**: Over-processing. Don't build more structure than you need. **Mid-market (Series C+, 100-300 engineers)**: **The challenge**: You have processes and structure, but they're creaky. Orgs have learned dysfunction. **Priorities**: (1) Diagnosing which parts of the org are broken and why. (2) Finding hidden technical debt (you're big enough that legacy systems exist). (3) Building a strong director bench (you need 8-10 directors running pieces). (4) Understanding what code/systems are business-critical vs. commodity. **Pitfall**: Trying to change everything. Focus on the most broken 2-3 pieces. **Enterprise (300+ engineers, public or near-IPO)**: **The challenge**: Org is complex, political, and slow. You're not the first VP. You have a legacy. **Priorities**: (1) Understanding the political landscape (who has real power?). (2) Identifying the biggest technical risks (you're carrying legacy from previous VPs). (3) Preparing for IPO if relevant (controls, documentation, processes). (4) Building partnerships with other functions (legal, compliance, finance). **Pitfall**: Assuming you have autonomy. You don't. You're part of an executive team with competing interests. **Turnaround (company is struggling, losing money, losing customers)**: **The challenge**: Time is short. You might fail. **Priorities**: (1) Stabilize. Stop the bleeding (reduce incidents, improve customer satisfaction). (2) Quick wins (ship features customers desperately want). (3) Diagnose root cause (is it technical? Org? Both?). (4) Build momentum. **Pitfall**: Thinking long-term. You need short-term wins to survive. **Acquired company (you're the VP at an acquired engineering team)**: **The challenge**: You're integrating with a larger org. You have less autonomy. **Priorities**: (1) Understanding the acquirer's expectations. (2) Retaining key people (they're your biggest risk). (3) Finding the right level of autonomy (how much can you do independently?). (4) Positioning your team as valuable (prove you're worth keeping, not replacing). **Pitfall**: Feeling like a loser. You were acquired. That's fine. Focus on succeeding in the new context. **Customization**: For each stage, your day 90 success metrics are different. Early stage: hired 5 engineers, established standards. Growth stage: hired director team, stabilized core systems. Mid-market: fixed top 3 broken pieces. Enterprise: prepared for IPO / built cross-functional partnerships. Turnaround: stopped the bleeding + shipped 2 quick wins."

      "heading": "VP Compensation Structures",
      "content": "VP Engineering/CTO total comp is complex. Understand all the pieces. **Base salary range**: (1) **Early stage (pre-Series A)**: $150K-$250K. You're taking a bet. Lower cash, higher equity upside. (2) **Growth stage (Series A-C)**: $220K-$350K. More stable, better salary. (3) **Late stage/late-stage pre-IPO**: $280K-$450K. Established market price. (4) **Location matters**: SF Bay Area is highest. Austin, Seattle 10-15% lower. Midwest/South 20-30% lower. (5) **Your track record matters**: First-time VP gets lower end. Director promoted gets midpoint. Proven VP gets upper end. **Bonus structure (annual cash bonus)**: (1) **Typical range**: 25-50% of base. (2) **At growth stage**: 30-40% typical. At enterprise: 40-50%. (3) **What it's tied to**: Company goals (did we hit revenue target?) + individual goals (did you hit your priorities?). (4) **Payout**: Usually paid quarterly or annually. Understand the mechanics. Some companies pay 100% if you hit both. Others are pro-rata (you hit 80% of targets, you get 80% of bonus). **Equity (the big one)**: (1) **Pre-Series A startup**: 1-2% is typical. This is a LOT of equity, but company is worth little. If company succeeds, could be worth $10M+. If fails, worthless. (2) **Series A-B startup**: 0.5-1% is typical. Less equity, but company has raised capital (validation). (3) **Series C+ startup**: 0.25-0.5%. Company is more valuable, so less equity needed. (4) **Late-stage pre-IPO**: 0.1-0.3%. Company is very valuable. (5) **Post-IPO**: Rarely given equity. Or small RSU grants ($200K-$500K over 4 years). **Equity mechanics you MUST understand**: (1) **Grant vs. vesting**: You're granted 0.5% over 4 years. That's the grant. You vest 25% after 1 year (cliff), then monthly over remaining 3 years. (2) **Cliff**: If you leave before cliff (usually 1 year), you get NOTHING. Know the cliff. (3) **Acceleration on change of control**: If company is acquired, does your equity accelerate? \"Single-trigger\" (automatic acceleration on acquisition) vs. \"double-trigger\" (acceleration only if you're also fired). You want double-trigger or at least 50% acceleration. (4) **Strike price**: Your shares are options at a strike price (often the valuation when granted). If company grows from $10M to $100M valuation, your options are worth 10x more. **Golden handcuffs**: Equity vests over 4 years. Year 1 vests 25%. After year 1, you're vested on 25% but remaining 75% is unvested. Year 4, you're fully vested. If you leave year 2, you leave behind 50% unvested equity. This keeps people at the company. Understand this. Don't leave equity on the table if company is doing well. **Signing bonus**: Especially when transitioning from another role. \"I'm leaving a bonus at my last company.\" Signing bonus replaces that. Typical: $50K-$200K depending on base salary. **Severance (crucial for executives)**: (1) **Typical**: 6-12 months base salary. (2) **Change of control**: Often 12 months base + 12 months accelerated equity vesting. (3) **For cause**: 0 severance usually. (4) **Without cause or constructive dismissal**: Full severance. **Understand this in negotiation**: If you get let go, what's your landing pad? 12 months of base salary = 12 months to find a job. **Other components**: (1) **Health insurance**: Usually 100% company paid (medical, dental, vision). (2) **401K matching**: Usually 3-4% company match. (3) **Paid time off**: Usually unlimited or 20+ days. (4) **Stock purchase plan (ESPP)**: Sometimes 10-15% discount on stock (for public companies). (5) **Executive perks**: Car allowance, phone allowance, home office budget, conference budget. For VPs these are usually $5K-$20K/year. **Total comp example (Series B company, SF)**: Base $300K + Bonus $90K (30%) + Equity 0.75% (worth maybe $500K over 4 years, $125K/year) + $15K perks = Total ~$500K in year 1. But equity only matters if company succeeds. **Negotiation leverage**: (1) **Multiple offers**: The strongest negotiating position. (2) **Your alternative**: If staying in current role, what's that worth? (3) **Market data**: Use levels.fyi, Blind, Payscale to understand market. (4) **Ask for \"numbers band\"**: Instead of haggling individual items, ask: \"What's your range for total comp?\" This speeds negotiation. **Red flags in comp packages**: (1) **No severance or low severance**: Risky. Push for at least 6 months. (2) **Single-trigger acceleration**: Good for you, but might indicate instability. (3) **Cliff is 2+ years**: Unusual and risky. (4) **Equity grant is tiny (0.05%)**: You're not being treated as VP-level. (5) **Bonus is \"at will\" with no definition**: Could be 0% or 100%. Get clarity. **Interview angle**: \"When evaluating roles, I consider base salary, bonus structure, equity (especially vesting and acceleration), and severance. I also look at whether equity aligns my long-term interests with the company. I'm not just chasing the biggest number—I'm evaluating the whole package and the risk/reward.\""

      "heading": "Evaluating an Offer Holistically",
      "content": "An offer is not just money. It's role, team, company, and mission. Evaluate all dimensions. **Financial dimension**: (1) **Base salary**: Is it in the 50th-75th percentile for your level/location? Use levels.fyi. (2) **Bonus**: 30% or higher? Is it achievable or fantasy? Ask previous executives if targets are realistic. (3) **Equity**: What % of company? What's current valuation? What's the upside? Run the math. If the company 5x, your 0.5% becomes worth $X. Is that meaningful? (4) **Severance**: Is it 6+ months? Change-of-control terms? (5) **Total comp**: Add it up. Does it exceed your current role by 20%+ to justify the switch? (Less than 20% increase might not be worth the risk.) **Role clarity dimension**: (1) **Your scope**: Do you own all engineering or just backend? Product-engineering relationship—are you equal partners? (2) **Reporting line**: Do you report to CEO, COO, or CTO? (CEO is usually better. COO or CTO might limit your scope.) (3) **Org size**: What's your headcount? Is it realistic? (If they say \"build to 50\" but only have budget for 30, red flag.) (4) **Success metrics**: How will your success be measured? Revenue growth? Velocity? Hiring? Ask. If they can't articulate it, red flag. (5) **Autonomy**: Do you get to build your own team? Pick tech stack? Or are you inheriting structures and constraints? (6) **Growth opportunity**: What's the path after this role? VP Eng -> CTO -> COO? Or is this a terminal role? **Team dimension**: (1) **Your boss (CEO or whoever you report to)**: Have you had multiple conversations? Do you respect them? Do they respect engineering? Ask them: \"What's your biggest weakness?\" (Good leaders can articulate this. Bad leaders get defensive.) (2) **Your peers**: Who's on the exec team? Are they strong? Do they collaborate or compete? Grab coffee with a few. (3) **Your directs**: Who will your directors be? Are they people the company likes or people being pushed out? (4) **Cross-functional relationships**: How's the engineering-product relationship? Engineering-sales? Do they respect each other? (5) **Team velocity**: If there's an existing team, are they shipping? Are they happy? One conversation with 2-3 engineers: \"What's it like to work here?\" Honest answer is more valuable than official narrative. **Company dimension**: (1) **Financial health**: Is the company funded for 18+ months? If not, you're betting on them raising more. (2) **Growth**: Is the company growing revenue (if revenue-generating)? Is it at risk? Ask the CEO: \"Walk me through the business. What keeps you up at night?\" (3) **Market**: Is the market real and growing? Or is this a shrinking market? (4) **Competition**: Who's the competition? Do they have better products? Funded better? (5) **Board and investors**: Do you know the investors? Are they reputable? (Some VCs are known for meddling.) (6) **Previous exits and outcomes**: Have the founders exited before successfully? Have they crashed and burned? Their track record matters. **Culture and mission dimension**: (1) **Culture match**: Do you like the way these people work? Fast and loose or methodical? Small and cohesive or growing and chaotic? (2) **Mission alignment**: Do you care about the problem they're solving? \"Make enterprise software easier\" is compelling. \"Sell more ads to teenagers\" might not be. (3) **Values alignment**: Do they talk about inclusion, impact, technical excellence? Do they live it or just talk it? (4) **Work-life balance signals**: Is the CEO always offline or always online? Are people working nights and weekends? (5) **Diversity**: Are women/minorities in leadership positions? Or just at IC levels? **Red flags (deal killers)**: (1) **Role is unclear or shifting**: \"Your responsibilities will evolve.\" = They don't know what they want. (2) **Very high expectations, low resources**: \"Build to 200 engineers with a $50K hiring budget.\" = Impossible. (3) **CEO doesn't respect engineering**: \"Engineering is a cost center.\" = Wrong. (4) **No severance or very low severance**: You need a landing pad. (5) **You'd be the first engineering leader**: Unless this is a deliberate play, this is risky. (6) **Equity heavily concentrated in far future**: \"You'll have upside in 5 years.\" You need some near-term upside. (7) **Reporting line doesn't make sense**: You report to the CFO instead of CEO. (8) **Previous VP was fired or quit abruptly**: What went wrong? If the founder is the issue, you'll hit the same wall. (9) **Org is toxic**: During interviews, you catch glimpses of dysfunction. Bad interviews, defensive answers, people bad-mouthing each other. (10) **You just don't feel it**: Gut check. If you're excited about money but not excited about the mission, team, or company, walk. **Decision framework**: (1) **Score each dimension** (financial, role, team, company, culture) on a scale of 1-10. (2) **Weight them** (for you, what matters most? If it's money, weight financial heavily. If it's mission, weight that heavily.) (3) **Calculate total weighted score**. (4) **If score is above 7 and no major red flags, seriously consider it**. (5) **If score is below 6 or there are major red flags, probably pass**. (6) **Trust your gut**. If your analysis says \"yes\" but your gut says \"no,\" usually trust your gut."

      "heading": "Negotiation Tactics for Executive Roles",
      "content": "VP negotiations are different from IC negotiations. You have more leverage, but you also have higher stakes. **Know your BATNA (Best Alternative to Negotiated Agreement)**: (1) **Current role value**: If you stay, what are you making? What's the upside? (2) **Time to find alternative**: If you don't take this, how long until the next offer? (3) **Risk tolerance**: Can you afford to wait or do you need a job? (4) **Multiple offers**: If you have multiple offers, you have leverage. (5) **Strong BATNA = stronger negotiation**. If you have another offer or a stable current role, you can push harder. Weak BATNA = accept more of their offer as-is. **Before negotiating, identify what matters to you**: (1) **Money**: Do you need more cash for personal reasons? Or is it principle? (2) **Equity**: Is the upside compelling? (3) **Title**: Does \"Head of Engineering\" vs. \"VP Engineering\" matter to you? (4) **Role scope**: Is the scope big enough? (5) **Severance**: Is this a risky move (startup, turnaround)? You might want higher severance. (6) **Flexibility**: Can you work remote? Start date? (7) **Bonus structure**: Do the bonus targets seem achievable? **Your negotiation approach**: (1) **Initial conversation**: \"Thank you for the offer. I'm excited about [specific things]. Before I say yes, let me share my perspective on a few things.\" (2) **Lead with enthusiasm, then raise asks**: \"I'm genuinely interested in this role and team. I'd like to discuss the compensation structure.\" (3) **Ask for flexibility, not just cash**: \"On salary, I was expecting $X. I also want to discuss [equity/severance/bonus targets]. What's negotiable?\" (4) **Anchor high but reasonable**: If they offer $300K and you expected $350K, ask for $370K. They'll come down, you'll meet in the middle. Anchor too high ($500K for a $300K role) = they stop negotiating. (5) **Don't negotiate just to negotiate**: You don't need to fight every point. Pick 2-3 things that matter. If they won't budge on base, maybe push on equity or severance. (6) **Use market data**: \"Based on levels.fyi and my market research, total comp for this level in this market is typically $450K-$550K.\" Factual basis = easier negotiation. (7) **Create optionality, not ultimatums**: \"On severance, I'd like to understand the options. Are we looking at 6 months, 12 months, or could we discuss a range?\" (8) **Be willing to walk**: If they won't negotiate and you have alternatives, be prepared to walk. Not aggressively, just calmly. \"I appreciate the offer, but I don't think this is the right fit at this comp level. If circumstances change, I'd be open to revisiting.\" (9) **Get it in writing before celebrating**: Until the offer letter is signed, it's not final. Details matter. **Specific negotiation scripts**: (1) **On base salary**: \"I'm excited about the role. For base salary, I was expecting around $X based on my experience and market data. Can we discuss?\" (2) **On equity**: \"Can we discuss the equity grant? What's the typical equity for a VP role at this stage?\" (They might have a range. You negotiate within it.) (3) **On bonus targets**: \"On the bonus structure, are these targets realistic given the company's plan? Walk me through how you set them.\" (4) **On severance**: \"If things don't work out, what's the severance package? I want to make sure we're aligned on the landing pad.\" (5) **On start date**: \"I want to give my current company proper notice [typically 2-4 weeks]. Can we schedule start for [date]?\" (6) **On title**: \"I noticed the offer says 'Head of Engineering.' I'd prefer 'VP Engineering' to be accurate to the scope. Can we adjust that?\" **Common negotiation tactics (and counter-tactics)**: (1) **They say \"this is our best offer, take it or leave it\"**: You can respond: \"I understand. Let me think about it. If you have any flexibility, I'd love to explore options.\" (2) **They say \"we have other candidates\"**: That's possible. It's also a negotiation tactic. Respond: \"I understand there are other candidates. I'm genuinely interested. Here's what would make this work for me.\" (3) **They lowball on equity**: \"Our typical VP grant is 0.1%.\" You: \"I was expecting 0.25%-0.5% based on [reasons]. What would 0.25% require?\" (4) **They balk at severance**: \"We don't typically offer severance to VPs.\" You: \"This is important to me for risk management. Most startups I know offer 6-12 months severance. What would be possible?\" **Negotiation endgame**: (1) **You've asked, they've responded, now decide**: Do you accept this offer or not? (2) **Last-minute asks are bad tactics**: Don't keep negotiating after they make final offer. Accept or decline. (3) **Thank them either way**: \"Thank you for the offer and the flexibility in negotiation. I'm excited to join.\" Or: \"Thank you for your time and flexibility. This isn't quite the right fit for me right now.\" **Red flags in their negotiation style**: (1) **Won't discuss details**: \"The offer is what it is.\" = Not collaborative. (2) **Aggressive timelines**: \"You need to decide in 48 hours or we move on.\" = Pressure tactic. (3) **Bait and switch**: Offer letter has different terms than discussed. (4) **Won't get it in writing**: Everything should be in writing before you resign from your current job. **Interview angle**: \"In negotiations, I focus on understanding what matters most to me and to the company, then finding creative solutions that work for both sides. I'm willing to be flexible on money if equity and role clarity are strong. I also care deeply about severance and change-of-control terms because those reflect the risk-sharing in the partnership.\""
    },
    {
      "heading": "The Reference and Backchannel Reality",
      "content": "At the executive level, references and reputation matter more. Prepare and be aware. **Formal reference calls**: (1) **Timing**: References happen late in the process, when they're seriously considering you (week before offer usually). (2) **Who they'll call**: CEO, former boss, peer VP you worked with closely, maybe a direct report. (3) **Prep your references**: Before process starts, reach out to 3-4 possible references. \"I might be interviewing. Would you be comfortable being a reference?\" Don't surprise them. (4) **Coach them**: Have a quick call. \"They'll likely ask about my leadership style, how I handle ambiguity/conflict, my strengths and gaps.\" (5) **Provide talking points**: If you're worried about a specific area, prep them. \"If they ask about technical depth, mention the systems redesign I led.\" (6) **Ideal references**: CEO (most credible), peer VP from another company (shows maturity), direct report who respects you (shows people skills). Avoid: people you haven't worked with recently, yes-people who'll give generic praise, people in your family/close circle. **Backchannel calls**: (1) **What they are**: The company reaches out to people they know who worked with you (not on your reference list). (2) **When they happen**: Usually weeks 3-4 of interview process. (3) **You can't control them, but you can anticipate them**: Think: \"Who does the CEO know? Who am I connected to through 2-3 degrees?\" (4) **Proactive reach-out**: If you know the acquirer or CEO, send them a heads-up. \"You might hear from [company] if they reach out to [person] about me.\" This isn't asking them to lie—it's alerting them you might get called. (5) **Network quality matters**: If you've built strong relationships, backchannel calls go well. If you've bridge-burned, they go poorly. (6) **What to expect them to ask**: Similar to reference calls. Leadership style, specific examples, your gaps, would they hire you again. **Due diligence on you**: (1) **Background check**: Verify degrees, employment history, no criminal record. (2) **LinkedIn verification**: Does your history match what you claimed? (3) **Maybe reference calls to companies they know**: \"Did you work with [candidate]? What was your experience?\" (4) **Executive assessments**: Some companies do executive coaching assessments (usually only for C-suite). Not typical for VP, but possible. **Your reputation over time**: (1) **Years 1-3 post-transition**: Your immediate previous boss/peers matter most. (2) **Years 3-10 post-transition**: Your broader industry reputation. Did you build a good name? Did you help people? Did you deliver? (3) **During interview process**: If you've been good to people (references, recommendations, help), they'll speak well. If you've been dismissive, they won't. **Managing potential weak references**: (1) **You left on bad terms with someone**: Inevitable sometimes. Don't hide it. Proactively explain to the company. \"I had disagreements with [previous CEO] on technical direction. I thought we should invest in platform; they wanted short-term velocity. I wasn't aligned, so I left. Lessons learned: communication could have been better.\" (2) **Someone left your team frustrated**: Also inevitable. They might give lukewarm reference. If asked about it later: \"Every manager has someone who wasn't happy. This person wanted more autonomy faster than I thought wise. They moved on. No hard feelings.\" (3) **You were fired or managed out**: Be honest and direct. \"I was let go in a reorganization.\" Or: \"My CEO and I had different visions. I left.\" Don't make excuses. **Two-way evaluation**: (1) **You're also checking them out**: During reference calls, ask them questions. \"How's the CEO with people? How does the company handle disagreement?\" (2) **Call references too**: If they're offering, call your potential future peers. \"What's it really like to work there?\" Get the ground truth. **Practical checklist**: Before interviews: Identify 3-4 reference options. Reach out and confirm. Before references are called: Remind them. After offer: Thank your references. Tell them about your new role. **Interview angle**: \"I'm thoughtful about my professional reputation and relationships. I maintain connections with previous bosses and peers. They'd speak well of me because I've supported them over the years. I also do my due diligence on references about potential employers—I want to understand the culture and leadership before committing.\""
    }

      "heading": "AI Strategy: Build vs Integrate vs Hybrid",
      "content": "AI is infrastructure now. As VP/CTO, you have three strategic paths, each with different economics, timelines, and defensibility. **Option 1: Integrate (Use frontier models)**: **What it means**: Use GPT-4, Claude, open-source (Llama, Mistral). Focus on prompt engineering, RAG (Retrieval-Augmented Generation), fine-tuning, application architecture. **Economics**: $100K-500K/year (API costs + 1-2 ML engineers). CAPEX is minimal. **Timeline**: Weeks to MVP. Months to production-grade. **Upside**: (1) Speed—hit market in 6 weeks, not 12 months. (2) Access to frontier capabilities—you get GPT-4o the day OpenAI releases it. (3) No model training burden—OpenAI does R&D, you benefit. (4) Flexibility—try RAG, try fine-tuning, try agents without long-term commitment. (5) Low risk—if you're wrong, you shut down with minimal loss. **Downside**: (1) Vendor dependency—if OpenAI changes pricing (they will), you're affected. (2) Commoditized—competitors can build the same feature. No moat. (3) Privacy—customer data goes to OpenAI. (4) Cost at scale—if you have 10M users, GPT-4 at $30/1K tokens gets expensive. (5) Model lock-in—your app is trained on GPT-4's behavior. Switching to another model is non-trivial. **When to do this**: (1) Early stage (pre-Series B). (2) Limited ML talent. (3) Want to prove AI matters for your product (3-6 month experiment). (4) AI is table stakes, not your moat. **Examples**: Most B2B SaaS adding AI copilots, most startups in 2024-2025, customer support features, content generation, code assistance. **Option 2: Build (Proprietary models)**: **What it means**: Hire ML engineers, build end-to-end. You own data pipeline, training, evaluation, serving, maintenance. **Economics**: $2-5M+/year (engineering team, compute infrastructure, data annotation, tooling). **Timeline**: 6-12 months to first meaningful model. 18-24 months to competitive advantage. **Upside**: (1) Defensibility—your model trains on your proprietary data. Competitors can't replicate without similar data. (2) Control—you own the stack. No vendor dependency. (3) Cost at scale—once trained, serving is cheap. Unit economics improve. (4) Moat—if your model is 10% better, that's defensibility that compounds. **Downside**: (1) Expensive and slow. (2) Hard to hire—ML talent competition is fierce. (3) Data requirements—need 100K-1M+ labeled examples for many problems. (4) Infrastructure complexity—distributed training, serving, monitoring at scale. (5) Continuous maintenance—models drift, degrade over time. (6) Research risk—you might spend 12 months and still not have something better than GPT-4. **When to do this**: (1) Series B+ with $100M+ funding or strong profitability. (2) Proprietary data is a moat (recommendation, fraud, personalization). (3) You have a strong ML leader/co-founder. (4) AI is core to your business (not an add-on). (5) You can wait 12-18 months for ROI. **Examples**: Netflix (recommendation), Stripe (fraud), Spotify (personalization), Meta (recommendation), Anthropic (language models). **Option 3: Hybrid (Most realistic for growth stage)**: **What it means**: Use frontier models for table-stakes features. Build proprietary models for your core differentiator. **Economics**: $500K-2M/year (mix of API costs + 3-5 ML engineers). **Timeline**: Month 1-2: quick MVP with GPT-4. Month 3-4: hire ML team. Month 6-12: proprietary model in production. **Upside**: (1) Fast to market (6 weeks). (2) Proof of concept (validate customers care before investing $1M). (3) Medium-term moat (proprietary model in 12 months). (4) Risk is spread (if one path fails, you have another). **Downside**: (1) Complexity—you're maintaining two systems. (2) Team friction—API team vs ML team might have different incentives. (3) Technical debt—might need to refactor API version when you shift to proprietary. **When to do this**: (1) Growth stage (Series B-C). (2) You understand your differentiation. (3) You have 1-2 ML engineers but need more. (4) You want to prove product-market fit before heavy investment. **Decision framework (Choose your path)**: (1) **Stage**: Pre-A? Integrate. Series A? Integrate with 1 ML hire. Series B? Hybrid. Series C+? Can build proprietary. (2) **Talent**: No ML? Integrate. 1-2? Hybrid. 5+? Build. (3) **Data**: Public data only? Integrate. Some proprietary data? Hybrid. Rich proprietary data (transactions, user behavior, unique signals)? Build. (4) **Differentiation**: Is AI table stakes or your moat? Table stakes=integrate. Moat=build or hybrid. (5) **Runway**: 6 months? Integrate (need quick wins). 12 months? Hybrid (can invest in building). 24 months? Can build. (6) **Economics**: $100K budget? Integrate. $500K? Hybrid. $2M+? Build. **Interview positioning**: \"We're at growth stage with $10M ARR. We're pursuing a hybrid model. For commodity features (summarization, search), we integrate Claude API—ship in 6 weeks, validate with customers. For our core differentiator [specific problem], we're building proprietary models. We hired 2 ML engineers, they're building on our proprietary data. In 12 months, we'll have a model that's 3x better than Claude for our use case. That becomes our moat. This approach gets us to market fast AND builds long-term defensibility.\" Shows: clarity on stage, realistic timeline, clear ROI, differentiation thinking."

      "heading": "Building Your AI Roadmap (Phased Approach)",
      "content": "Adding AI to your product is a multi-phase effort. Don't try to do everything at once. **Phase 1: Rapid MVP (Weeks 1-4)**: (1) Identify ONE high-value use case. Not 10 ideas—one. Examples: \"Help customers write emails\" or \"Auto-categorize support tickets\" or \"Suggest recommendations\". (2) Build MVP using Claude or GPT-4 API. Minimal infrastructure. (3) Get 10-20 customers using it. Measure: do they value it? Cost: ~$30-50K to build, $500-1K/month in API. **Phase 2: Evaluation & Optimization (Months 2-3)**: (1) Measure quality. Define success: \"Correct 80% of the time\" or \"95% accuracy\". (2) Build evaluation framework. Have humans rate AI outputs. Track metrics. (3) Optimize: better prompts, few-shot examples, cheaper models (Mistral instead of GPT-4). (4) Cost model: At 10K users, what's the API bill? Is it sustainable? Cost: same ~$1K/month API. **Phase 3: Productionization (Months 4-6)**: (1) Move beyond MVP: error handling, logging, monitoring. (2) Add guardrails. Human review for critical decisions. (3) Infrastructure: prompt management, evaluation system, serving infrastructure. (4) Security: audit for hallucinations, bias, data leakage. (5) Hire 1 ML engineer for evaluation and optimization. Cost: $50-100K/month (infra + API). **Phase 4: Proprietary (Months 6-12, if warranted)**: (1) If strong customer traction, evaluate proprietary model. (2) Collect training data from customer interactions (with consent). (3) Fine-tune Claude or GPT-4 on your domain. Is it 30% better? If yes, pursue. If no, stay API-based. (4) Hire 2 more ML engineers. Explore proprietary or advanced RAG/agents. Cost: $300-500K/month. **Phase 5: Scale (12+)**: (1) Roll out AI across product. (2) Each feature gets same phase 1-4 treatment. (3) By year 2, AI is table stakes. You're either dominant (proprietary) or competitive (API). **Financial model**: Month 1: $55K cumulative. Month 3: $58K. Month 6: $300K invested. Month 12: $600K invested. ARR impact: month 6 =       "heading": "Responsible AI & Risk Management",
      "content": "AI can amplify problems if not managed well. **Bias risks**: AI models can perpetuate or amplify biases in training data. If your data is biased (e.g., historical hiring data where women were hired less), the model learns that bias. **Mitigation**: Audit training data. Test for bias across demographics. Monitor predictions over time. **Privacy risks**: If you're using customer data to train models, ensure compliance (GDPR, CCPA, etc.). **Mitigation**: Anonymize data. Get explicit consent. Build privacy-preserving approaches (federated learning, differential privacy). **Hallucination risks**: LLMs can confabulate (make up information that sounds plausible but is false). If your product relies on accuracy (medical, legal, financial), this is risky. **Mitigation**: Add human review. Use RAG (retrieval-augmented generation) so models cite sources. Set confidence thresholds. **Security risks**: AI models can be attacked (adversarial examples, prompt injection). **Mitigation**: Monitor for attacks. Build robustness. **Interview angle**: Show you understand AI isn't risk-free and you take responsibility seriously."

      "heading": "Why D&I Matters for Engineering Leaders",
      "content": "D&I is not a HR initiative—it's a business and leadership imperative. **The business case (not just ethics)**: (1) **Diverse teams innovate more**: BCG research shows diverse teams have 19% higher innovation indices. Why? Diverse thinking leads to better problem-solving. Homogeneous teams think alike and miss blind spots. (2) **Diverse teams make better decisions**: MIT research shows gender-balanced teams outperform all-male or all-female teams. Why? Diverse perspectives challenge assumptions. (3) **Retention improves with inclusion**: Gallup: Organizations with high engagement have 40% lower turnover. Engagement is higher in inclusive environments. (4) **Financial performance**: Deloitte: Inclusive organizations have 3x the financial performance of non-inclusive. Why? Better decision-making, lower turnover, stronger talent attraction, better risk mitigation. (5) **Recruiting advantage**: Top talent (especially women and underreps) care about inclusive cultures. You attract better people. (6) **Customer alignment**: Your customers are diverse. Your team should reflect that. If your product is 20% for women, but women hate using it (because the team has bias), you're missing revenue. **Why diversity WITHOUT inclusion fails**: (1) **Tokenism backfire**: You hire one woman. She's \"the diversity hire.\" Extra scrutiny. Extra pressure. She leaves. (2) **Survival vs. thriving**: Diverse people survive in non-inclusive orgs but don't thrive. Lower engagement, less mentorship, slower promotion. (3) **Blame the person, not the system**: \"She didn't work out.\" Actually, the culture didn't welcome her. **Why it matters in your VP interview**: (1) **Company is evaluating you**: They want to know if you'll actively build inclusion or just check a box. (2) **Culture fit matters**: Are you someone who'd fight for inclusion or would you stay silent? (3) **Your credibility depends on it**: If you don't take it seriously, you'll be seen as tone-deaf. (4) **Talent will test you**: In your first month, your team will watch how you handle diversity issues. Your response defines you. **VP-level D&I thinking** (What interviewers want to see): You understand D&I is: (1) **A systems problem, not a people problem**: Homogeneous teams aren't lazy. It's the system. Default referral networks are homogeneous. Interview panels without diversity unconsciously favor similar people. Fix systems, not people. (2) **Your responsibility**: You own this. You can't delegate to HR. You make hiring decisions. You approve budgets. You hold people accountable. (3) **Multi-year work**: You can't build inclusive culture in 90 days. Budget 3-5 years of intentional work. Measure progress annually. (4) **Your values must be clear**: When you say \"we value inclusion,\" people watch if you actually do. If a director makes a dismissive joke about women, how do you respond? If a candidate from an underrep group gets weaker interview feedback, how do you investigate? This is where values get tested. **Interview angle**: \"D&I is a business imperative for me, not just ethics. Diverse teams are more innovative and make better decisions. I'm focused on building inclusive systems—hiring practices, management development, promotion criteria—that attract and retain the best talent regardless of background. I'm also personally accountable for this. If our team isn't becoming more diverse and inclusive, that's on me.\""

      "heading": "Building Inclusive Hiring & Retention",
      "content": "**Hiring practices**: (1) **Diverse candidate sourcing**: Default recruiting sources (ivy league referrals, specific networks) create homogeneous slates. Expand: HBCUs, women-focused tech communities, underrepresented communities. (2) **Structured interviews**: Unstructured interviews have high bias. Use structured rubrics. (3) **Diverse interview panels**: If all interviewers are from the majority group, bias can slip through. Include diverse people on interview panels. (4) **Remove unnecessary barriers**: \"Requires 10 years experience\" can exclude people who had non-traditional paths. Be specific: \"Requires 10 years building distributed systems\" is better. **Retention practices**: (1) **Sponsorship, not just mentorship**: Mentorship is advice. Sponsorship is advocacy—helping someone get opportunities. Women/underreps need both but often only get mentorship. (2) **Inclusive culture signals**: Do people from underrepresented groups see people like them in leadership? Can people be their authentic selves? (3) **Pay equity**: Audit your pay across demographics. Men/women, majority/underreps for the same role should make similar money. (4) **Growth opportunities**: Are underreps being promoted at the same rates? If not, why? (5) **Psychological safety**: People need to feel they can speak up without retaliation. This is foundational."
    },
    {
      "heading": "Measuring D&I & Avoiding Tokenism",
      "content": "\"What gets measured gets managed.\" D&I needs metrics. **Key metrics to track**: (1) **Representation at each level**: Create a diversity dashboard. Entry level: X% women, Y% underreps, Z% international. Mid level: different %. Senior level: different %. Director+: different %. Track yearly. You're looking for improvement, not perfection. Typical healthy progression: if you're 40% women at entry level, aim for 35% at mid, 30% at senior, 25% at director (you're losing some people in earlier years). Goal: minimize the drop-off. If you're 50% women at entry but 10% at senior, you have a problem (probably retention or promotion bias). (2) **Retention by demographic**: Critical metric. \"How many women left last year? How many men?\" If women have 30% higher turnover than men in the same role, investigate why. Often it's culture (microaggressions, exclusion) or advancement (passed over for promotion). (3) **Pay equity**: Audit annually. For the same role and level, women should earn within 5% of men. If there's a gap, fix it. This is both ethical and legal risk. (4) **Promotion rates**: Are underreps promoted at the same rate as majority group? If women get promoted 50% less often, you have a bias in promotion criteria. (5) **Hiring pipeline**: Of applicants, interviews, offers, hires—what's the breakdown by demographic at each stage? If 30% of applicants are women but 10% of hires are women, you have filtering problems in your process. (6) **Engagement scores**: Monthly pulse survey. \"How included do you feel?\" Segment by demographic. If underreps feel less included, dig in. (7) **Manager diversity**: What % of managers are women/underreps? Underreps are more likely to have underrep managers. If all your managers are majority-group, that's a bottleneck. **Avoiding tokenism (critical)**: (1) **The token effect**: One woman on a 10-person team. She's the \"diversity hire.\" Extra scrutiny. Extra pressure. She leaves. You hired for diversity and created a backlash instead. (2) **Critical mass**: Research shows at 30%+ representation, people stop being tokens and just become colleagues. (3) **Your strategy**: Don't hire one woman. Hire 3. Hire 3 more the next year. In 2 years, you're 30% women. Now they're not tokens. (4) **Accountability**: If you hire a diverse person and they leave in year 1, ask why. Often it's not their fault—it's your system. **ERGs (Employee Resource Groups)**: (1) **What they are**: Voluntary groups (Women in Tech, Black in Tech, LGBTQ+, Parents in Tech, etc.). They provide community and support. (2) **Upside**: Create belonging. Give underreps a community. Influence company decisions (ERG gives feedback on D&I initiatives). (3) **Downside**: Can create burden. \"You joined Women in Tech, so now you have to speak for all women.\" Can also become insular (ERG-only events that exclude the majority group). (4) **Your approach**: Actively support ERGs with budget and leadership visibility (CEO/VP should engage). But also make them truly voluntary. Don't pressure people to join. And don't burden them with \"fixing\" diversity. Diversity is the leadership team's job, not the ERG's job. (5) **Inclusion best practices for ERGs**: Invite the majority group to ERG events (allies strengthen the group). Give ERG leaders real influence on hiring, promotion, culture decisions. Support their professional development (sponsorship, training). **Diversity debt**: (1) **What it is**: Homogeneous org you've inherited. 90% white men. What do you do? (2) **Long game**: You can't flip it overnight. Over 3-5 years, hire intentionally. By year 3, you're 60% majority/40% diverse. (3) **Don't just hire—retain**: If your retention of underreps is terrible, hiring more is a waste. Fix culture first. (4) **Communication**: Be transparent. \"Our team isn't diverse yet. We're intentionally building that. Here's the plan. Here's what we've hired. Here's what's working and what's not.\" (5) **Expectations**: Set realistic timelines. You can't go from 90% majority to 50/50 in a year without radical change. But you can show progress. \"Last year we were 85% majority. This year 80%. We're on track.\" **Interview angle**: \"I measure D&I by tracking representation at each level, retention by demographic, pay equity, and promotion rates. I invest in recruiting underreps and in creating inclusive culture so they stay. I also track engagement scores by demographic to understand where we're failing and fix it. D&I is not a program—it's a business metric like velocity or revenue.\""
    },
    {
      "heading": "Inclusive Leadership Practices",
      "content": "As a VP, how do you model inclusion? (1) **Be visible and vocal**: If you speak up about inclusion, it matters. (2) **Listen and learn**: Don't pretend to understand all perspectives. Ask. Learn. (3) **Address bias when you see it**: Micro-aggression, bad jokes, dismissive comments—address them immediately. (4) **Develop diverse leaders**: Ensure underreps have access to high-visibility projects, sponsorship, and pathways to leadership. (5) **Admit mistakes**: If you say something insensitive, own it. \"That was wrong. I'm learning.\" This gives permission for others to grow too. **Red flags**: If you see people from underrep groups leaving at high rates, or if you don't see them in leadership, something is broken. Investigate."
    }

      "heading": "Parallel Processes & Timeline Management",
      "content": "Smart VP candidates juggle multiple processes. You want optionality and competitive dynamics working in your favor. **Managing multiple processes**: (1) **Track status explicitly**: Create a spreadsheet. Company A (Stage: final interviews, Timeline: decision by 3/20). Company B (Stage: round 1, Timeline: TBD). Company C (Stage: offer pending). Update weekly. (2) **Communicate transparently**: You're not playing games; you're being honest. \"I have another process moving quickly. Can we accelerate the timeline?\" Most companies will accelerate if you're serious. (3) **Use one offer to accelerate others**: \"I have an offer from Company A with a decision date of 3/25. I'm interested in Company B. Where are you in the process?\" This creates urgency without being aggressive. (4) **Don't make threats, create clarity**: \"I need to make a decision by 3/25.\" That's a fact, not a threat. Companies can respond (accelerate, make an offer, or bow out). (5) **Understand their timeline**: Some companies move fast (weeks). Some slow (months). You can't speed up slow. But you can plan around it. If Company C moves at glacial pace and Company A offers in 2 weeks, you make a choice: accept Company A or tell Company C you're off the market. **Offer timing and strategy**: (1) **First offer arrives**: \"Thank you for this offer. I'm genuinely interested. I have other processes ongoing. Can I have until [date] to decide?\" Most companies will give you a few days (48 hours to 1 week). (2) **Use first offer momentum**: Tell other companies you have an offer. \"I have an offer from Company A. I'd like to move forward with you too. Can we accelerate?\" Urgency works. (3) **Don't accept the first offer reflexively**: You might have better offers coming. \"I'd like a day to think about this.\" But don't wait too long. Companies lose interest in waiting candidates. (4) **If you have multiple offers**: Congratulations. Now you're actually choosing, not negotiating from weakness. Compare them holistically (as discussed in M40). Make a decision based on the best overall fit, not just the highest number. (5) **Declining gracefully**: If you decline an offer, do it professionally. \"Thank you for this opportunity and offer. I've decided to pursue another opportunity that's a better fit for me right now. I appreciate your time and flexibility throughout the process.\" Don't burn bridges. The founder might be your future customer or investor. **Managing interviewing while employed**: (1) **Scheduling**: Interviews during business hours are hard if you're employed. Ask for early morning (7-8am), lunch hour, or late afternoon (5-6pm) slots. (2) **Communication with current employer**: Most places assume you're interviewing once you take time off. Be transparent with your manager (or at least with your HR/exec team as appropriate). \"I'm exploring opportunities\" is honest. (3) **Energy management**: Full-time job + interviewing = exhausting. You'll be drained. Manage: (a) Pick 2-3 serious processes, not 10. (b) Batch interviews (get interviews done in 1-2 weeks, then wait for decisions). (c) Take care of yourself (sleep, exercise, it matters). (4) **Current job execution**: Don't let interviewing distract you from your current job. Your current boss and team need you. Deliver. This also makes you more attractive (you're someone who finishes what they start). **Communication cadence**: (1) **With recruiters**: Respond within 24 hours. Keep them updated. They're your allies. (2) **With hiring managers**: After each interview, send a thank-you note. Reference something specific. \"I enjoyed learning about your approach to technical debt. I have thoughts on how we'd approach it.\" (3) **With companies**: If you need to slow down or speed up, communicate clearly. \"My timeline is shifting. I'd like to pause for a week, then resume.\" or \"I'd like to accelerate. Can we do round 2 this week?\" (4) **Decision communication**: Once you've decided, tell everyone. \"I've accepted an offer with [Company]. Thank you for your time and flexibility.\" Let people move on. **Red flags in process management**: (1) **Company ghosts you**: \"We'll follow up in a week.\" You never hear from them. After 10 days, follow up once. If nothing, move on. (2) **They pressure you to decide before you're ready**: \"We need an answer in 24 hours.\" Professional companies give at least 48 hours. (3) **They're disorganized**: Interviews are cancelled last-minute. Different interviewers ask different things. Schedules slip. This reflects the company. Run. **Final decision framework**: (1) **Compare offers systematically** (as in M40). (2) **Sleep on it**: Don't decide while emotional. Wait 24 hours. (3) **Trust your gut**: If you're excited, do it. If you're hesitant, ask why. (4) **Commit fully**: Once you've decided, commit. Don't look back or second-guess. You chose wisely or you'll learn from it. Either way, commit. **Interview angle**: \"I'm strategic about managing multiple processes. I keep all parties updated, I move quickly when I find the right fit, but I also don't rush decisions. I've learned that parallelism creates better options and forces companies to compete for you on merit, not just because you're desperate.\""
    },
    {
      "heading": "Building Relationships with Recruiters",
      "content": "Recruiters will be coordinating many rounds, reference calls, and offer details. **Build the relationship**: (1) Respond quickly to their asks. (2) Be honest about your timeline and constraints. (3) Give them feedback on the process. \"The second round felt productive.\" (4) Thank them. They're working hard to make this happen. **What NOT to do**: (1) Play recruiters against each other. \"Your competitor is offering X, can you match?\" If you do, do it directly to the hiring manager, not to the recruiter. (2) Go silent. If you're no longer interested, tell them. (3) Be rude. They're intermediaries between you and the company. Burn the bridge, and it affects the offer."
    },
    {
      "heading": "Reference Strategy & Back-Channel Management",
      "content": "References are coming. Prepare. **(1) Select references strategically**: Who should you have speak for you? Ideally: former boss, peer/VP you worked with closely, direct report who respects you. Avoid: yes-people who will say you're great but won't add depth. (2) **Coach your references**: Have a conversation beforehand. \"You might get called about [skills]. Can you speak to my work on [specific project]?\" (3) **Provide talking points**: \"Here are the questions they might ask and here's what I'd want you to highlight...\" (4) **Back-channel references**: These are informal calls to people the company knows who worked with you. They'll try to find these. You can't stop them, but you can be aware. Mention to trusted people: \"I'm interviewing; if [company] calls, would you be open to talking?\" This way there are no surprises. (5) **Timing**: References happen late, when they're serious. Don't expect them until week before offer."
    },
    {
      "heading": "Negotiating & Closing",
      "content": "Once you have an offer: **(1) Understand what's negotiable**: Salary, bonus %, equity, title, role scope, start date, remote/hybrid. (2) Know your BATNA**: Best alternative to negotiated agreement. What's your current role worth? What's your walk-away? (3) Negotiate thoughtfully**: \"Thank you for this offer. I'm excited about the role. On compensation, I was expecting [X]. Can we discuss?\" (4) Be reasonable**: Companies have bands. You can negotiate within the band, usually. You can't ask for 2x market. (5) Get it in writing**: Everything should be in an offer letter. No handshake deals. (6) Final check**: Before signing, make sure: title is right, role is clear, compensation is clear, start date works, and you feel good about it. If something feels off, ask."

      "heading": "Selecting & Coaching References",
      "content": "References are often called in the final stage. You want them to be strong advocates, not just yes-people. **(1) Who to reference**: (A) Former direct manager (most credible). (B) Peer VP or peer leader you worked closely with. (C) Direct report who respects you. (D) CEO if relationship is strong. Avoid: People you've never had conflict with (not credible) or people you don't actually know well. **(2) Coaching references**: Before the interview process starts (or at least before reference calls), have a conversation. \"I'm interviewing for a VP role. You might get called. Here's what I'd want highlighted...\" **(3) Specific talking points**: Don't just say \"speak for me.\" Be specific. \"If they ask about how I handle scale, I'd want you to mention the time we grew from 50 to 200 engineers.\" This helps them give a better reference. **(4) Heads up**: Tell them: company name, timeline, and what they might be asked. Gives them context."
    },
    {
      "heading": "Back-Channel References & Reputation Management",
      "content": "Back-channel calls are informal, unofficial, and often the most honest assessment. You can't control them, but you can anticipate and manage them. **(1) Understand what back-channels are**: The company calls people they know who worked with you. This person isn't on your reference list—you didn't give them permission. They just happen to know someone. The CEO might say: \"Do you know Jane Smith? We're considering her for VP Eng.\" The acquaintance says: \"Oh yes, I worked with her at [company]. She's great/terrible/mixed.\" This is powerful because it's unfiltered. **(2) Who might they call**: Anyone connected to the interviewer or company leadership. Previous coworkers. Customers. Industry peers. Competitors (they often know each other). Universities you attended. Conferences where you spoke. You don't know who until the call happens. **(3) Anticipate who they might know**: Think: \"This CEO's background is in fintech. They probably know people from Stripe, Square, or other fintech companies I've worked with.\" These are your likely back-channel references. **(4) Proactively reach out to likely back-channels**: \"I'm interviewing for a VP role with [company]. You might hear from them about me. I'd appreciate if you could speak to [specific things].\" This isn't asking them to lie. It's alerting them and helping them prepare a thoughtful answer. Examples: \"If they ask about how I handle technical debt, mention the infrastructure rewrite I led at [company].\" Or: \"I had a growth-oriented relationship with [previous CEO], and it didn't always work out. I'm not asking you to defend me, just to be fair.\" **(5) Network intentionally**: The best reputation is built over years. Be good to people. Help them. Reference them. Advocate for them. Your industry is smaller than you think. That junior engineer you mentored 5 years ago? Maybe they're now at the company interviewing you. That director you worked with? Maybe they know your potential future CEO. **(6) Understand your reputation**: Ask yourself honestly: \"What do people say about me when I'm not in the room?\" Good leaders: \"She's direct, fair, and ships.\" Or: \"He's tough but mentors you well.\" Bad reputation: \"She's political and takes credit.\" Or: \"He's a brilliant engineer but terrible at people.\" If you're not sure, ask a trusted advisor. **(7) Know your vulnerabilities**: **(a) If you left a previous job badly**: You might have poor back-channel references. \"I had strong disagreements with the CEO about strategy. I thought we should invest in platform; he wanted short-term velocity. We couldn't align, so I left.\" This is a factual, neutral framing. It doesn't bash the CEO. It explains the mismatch. If a back-channel call happens, they'll hear: \"She left because of disagreement. She's not a yes-person.\" That's actually okay—it shows you have conviction. **(b) If you had conflict with a peer**: \"I didn't work well with the VP of Product. We had different communication styles and disagreed on product direction. It was a learning experience.\" Again, neutral and honest. **(c) If you got fired**: \"I was let go in a restructuring.\" Or: \"My CEO and I had different visions and we agreed to part ways.\" Be straightforward. If a back-channel call happens, they'll hear you were let go. That's okay—how you talk about it matters. **(8) Build your brand proactively**: Write. Speak at conferences. Contribute to open source. Mentor people. Build a reputation that precedes you. When someone asks: \"Do you know Jane?\" they might say: \"She wrote that great article on scaling engineering. She seems thoughtful.\" **(9) The reference-that-bombs scenario**: Despite all precautions, someone gives you a lukewarm or negative back-channel reference. What now? (a) You probably won't know it happened (back-channels are secret). (b) If you get rejected, ask the recruiter: \"Was there feedback that concerned you?\" They might not tell you the back-channel, but they might give a hint. (c) If you later learn someone gave you bad feedback, don't confront them aggressively. Instead: \"I heard you had concerns about me. Can we grab coffee? I'd like to hear your perspective and clarify anything you'd like to understand.\" Sometimes it's a misunderstanding. Sometimes they're right and you learn something. Either way, you handle it professionally. **(10) Long-term reputation management**: (a) Maintain relationships. Stay in touch with ex-colleagues. (b) Help people. If someone asks for a reference or advice, do it. (c) Don't trash people or companies, even if you left badly. (d) Admit mistakes. If you know you handled something poorly, be honest about it. (e) Follow through. If you say you'll help someone find a job, do it. Your reputation is your most valuable asset. **Interview angle**: \"I'm thoughtful about my reputation and relationships. I stay in touch with people I've worked with over the years. I'm also honest when I reflect on past situations—I've had conflicts that didn't work out, and I've learned from them. I think back-channel references are a fair assessment. People who've worked with me closely can speak to my strengths and my growth areas. I'm not worried about back-channels because I've tried to treat people well and be direct about disagreements.\""
    },
    {
      "heading": "The Reference Call Itself",
      "content": "Companies will call your references. What will they ask? **Common questions**: (1) \"How would you describe [candidate]'s leadership style?\" (2) \"Tell me about a time they handled conflict/ambiguity/scale.\" (3) \"What are their gaps?\" (YES, they ask about weaknesses. A reference who only says positive things sounds fake.) (4) \"Would you hire them again?\" (5) \"What's your level of confidence in them for a VP role?\" **Ideal reference responses**: Specific examples. Honest weaknesses (\"They can be impatient, but they also move fast\"). Clear confidence. **If a reference bombs**: Understand why afterward. Maybe they're just not a good reference. Note it for next time. Maybe they had issues with you that you should address. Either way, learn."
    },
    {
      "heading": "Managing the Narrative",
      "content": "Your references tell a story. Make sure it aligns with your narrative. **(1) Consistency**: Your story should align with what your references say. If you say \"I'm great at building culture\" but your reference says \"they're technically oriented but don't focus on people,\" that's misalignment. (2) **Proactive positioning**: Coach references to emphasize what matters for THIS role. For a CTO role, emphasize technical vision. For a VP Eng role, emphasize people leadership. (3) **Owning your narrative**: If you have a gap (\"I haven't done X\"), don't hide it. Address it directly. \"I haven't scaled an org from 0-1000, but I've scaled from 50-200 and I have a framework for 1000.\""

function renderContent(text, styles, c) {
  if (!text) return null;

  // Split text into chunks by bold-header patterns like **Something:** or **Something**
  // Bold headers at the start of a section become accent-colored section headers
  const chunks = [];
  const headerPattern = /\*\*([^*]+)\*\*:?\s*/g;
  let lastIndex = 0;
  let match;
  const matches = [];

  while ((match = headerPattern.exec(text)) !== null) {
    matches.push({ index: match.index, header: match[1], fullMatch: match[0], end: match.index + match[0].length });
  }

  if (matches.length === 0) {
    // No bold headers found, render as regular paragraphs
    return text.split('\n\n').map((para, i) => {
      const parts = para.split(/\*\*(.*?)\*\*/g);
      return React.createElement(
        'p',
        { key: i, style: styles.bodyText },
        ...parts.map((part, j) =>
          j % 2 === 1
            ? React.createElement('strong', { key: j, style: { color: c.headingText, fontWeight: 700 } }, part)
            : part
        )
      );
    });
  }

  // Extract intro text before first bold header
  const introText = text.substring(0, matches[0].index).trim();
  if (introText) {
    chunks.push({ type: 'intro', text: introText });
  }

  // Extract each bold-header block
  for (let m = 0; m < matches.length; m++) {
    const contentStart = matches[m].end;
    const contentEnd = m + 1 < matches.length ? matches[m + 1].index : text.length;
    const content = text.substring(contentStart, contentEnd).trim();
    chunks.push({ type: 'section', header: matches[m].header, content: content });
  }

  return chunks.map((chunk, i) => {
    if (chunk.type === 'intro') {
      const parts = chunk.text.split(/\*\*(.*?)\*\*/g);
      return React.createElement(
        'p',
        { key: i, style: { ...styles.bodyText, marginBottom: '24px' } },
        ...parts.map((part, j) =>
          j % 2 === 1
            ? React.createElement('strong', { key: j, style: { color: c.headingText, fontWeight: 700 } }, part)
            : part
        )
      );
    }

    // Section paragraph with accent-colored bold header
    const contentParts = chunk.content.split(/\*\*(.*?)\*\*/g);
    const headerEl = React.createElement(
      'strong',
      { style: { color: c.accent, fontWeight: 700 } },
      chunk.header
    );

    return React.createElement(
      'p',
      { key: i, style: { ...styles.bodyText, marginBottom: '24px' } },
      headerEl,
      ': ',
      ...contentParts.map((part, j) =>
        j % 2 === 1
          ? React.createElement('strong', { key: j, style: { color: c.headingText, fontWeight: 700 } }, part)
          : part
      )
    );
  });
}

function calculateProgress(state) {
  const totalModules = modules.length;
  const completedModules = modules.filter(mod => state[mod.id]?.quizPassed).length;
  return totalModules > 0 ? Math.round((completedModules / totalModules) * 100) : 0;
}

function getTotalMinutes(mods) {
  return mods.reduce((acc, mod) => acc + (mod.estimatedMinutes || 0), 0);
}

function getStatusIcon(moduleId, state) {
  const moduleState = state[moduleId];
  if (!moduleState) return '○';
  if (moduleState.quizPassed) return '✓';
  if (moduleState.completedSections && moduleState.completedSections.length > 0) return '◆';
  return '○';
}

// ============================================================================
// GitHub Sync
// ============================================================================

const ghRepo = "mg00511/exec-interview-course";
const ghFile = "progress.json";

function githubSync(token, progress) {
  var headers = { "Authorization": "token " + token, "Accept": "application/vnd.github+json" };
  return fetch("https://api.github.com/repos/" + ghRepo + "/contents/" + ghFile, { headers: headers })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(existing) {
      var body = {
        message: "Sync progress",
        content: btoa(JSON.stringify(progress, null, 2))
      };
      if (existing && existing.sha) body.sha = existing.sha;
      return fetch("https://api.github.com/repos/" + ghRepo + "/contents/" + ghFile, {
        method: "PUT", headers: headers, body: JSON.stringify(body)
      });
    })
    .then(function(r) { return r.ok; })
    .catch(function() { return false; });
}

function githubLoad(token) {
  return fetch("https://api.github.com/repos/" + ghRepo + "/contents/" + ghFile, {
    headers: { "Authorization": "token " + token, "Accept": "application/vnd.github+json" }
  })
  .then(function(r) { return r.ok ? r.json() : null; })
  .then(function(data) {
    if (data && data.content) return JSON.parse(atob(data.content));
    return null;
  })
  .catch(function() { return null; });
}
