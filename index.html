t means \"I need more data.\" You probe more with this reference or call another. Option A is correct but C is more strategic. Option B ignores the dodge. Option D overreacts."}, {"scenario": "You're hiring VP Eng. Strong candidate. Backchannel reference says \"brilliant engineer but burned out at our company. Left because of conflict with leadership.\" Provided reference (their former manager) didn't mention this. What's your move?", "options": ["Pass. If there's conflict with leadership, this is a red flag for a VP role.", "Dig in. Call the provided reference again and ask about conflict. Call another backchannel to see if it's a pattern. Ask the candidate to explain the situation.", "Trust the provided reference (curated by the candidate). Backchannel is one person's opinion.", "Offer the role but put them on probation for 90 days to see if conflict issues resurface."], "correct": 1, "explanation": "Option B shows VP rigor: one backchannel reference isn't enough to reject, but it's a signal to dig in. Gather more data before deciding. Option A overreacts. Option C ignores a real signal. Option D avoids the decision."}, {"scenario": "Reference call for a CTO candidate from a startup you don't know. Their CEO says, \"They're brilliant but shipped code without proper review. Security issues resulted.\" The candidate says it was a learning moment. How do you evaluate?", "options": ["Red flag. A CTO should know security best practices. This is disqualifying.", "Ask the CEO for specifics: How serious were the issues? Were they caught before production? Did the candidate take responsibility and change? Then ask the candidate for their version and see if they align.", "Assume startup culture was chaotic. The candidate might be strong in a more structured environment.", "Ask the candidate to explain, but don't call the CEO back. You don't want to seem like you don't trust the candidate."], "correct": 1, "explanation": "Option B shows VP rigor: dig into actual severity and how the candidate responded. One reference mentioning a past mistake isn't disqualifying if the candidate learned and changed. You're triangulating: fact, how they handled it, are they honest? Option A is too absolute. Option C makes excuses. Option D avoids verification."}, {"scenario": "You're on Day 2 of a VP interview loop. Morning technical interview was hard. You're tired. Afternoon is your final interview with the CEO (offer conversation). How do you approach it?", "options": ["Push through. You're almost done. You can rest after.", "Acknowledge you're tired but push for energy. Sit up straight, lean in, make eye contact. Fake it if you need to.", "Be honest. \"I've had a long day of interviews. I might not be as sharp as this morning.\"", "Ask if you can reschedule the final interview to the next day. You need rest."], "correct": 1, "explanation": "Option B shows VP stamina: you acknowledge the fatigue internally but don't show it externally. You push through with good body language and energy. That's what stamina means. Option A is careless. Option C is honest but undermines yourself. Option D avoids the challenge."}, {"scenario": "Company B's CEO says, \"We love you. We want to move fast. We need an answer by Friday.\" It's Wednesday. You haven't finished Company A's loop. What do you do?", "options": ["Say yes to Company B to move fast. You can always back out.", "\"I'm honored by the offer. I'm also interviewing at another company. I want to be fair to both processes. Can I give you an answer by Monday?\" (Transparent, honest.)", "Don't mention Company A. \"I need time to think. Can I get back to you by Monday?\"", "\"I'm very interested. Let me finish my other loops and I'll have a clear answer for you by Monday. This timeline makes sense for me.\""], "correct": 1, "explanation": "Option B shows VP judgment: you're transparent about other opportunities. Companies respect honesty and directness. Option A is risky (backing out damages trust). Option C is y.'", "Acknowledge it and be flexible. Acquisitions happen and VPs adapt."], "correct": 2, "explanation": "VP-level: You don't just accept the information (option 0, 3) or run (option 1). You ask a clarifying question: is this an established deal or a hope? Is it contingent on you? An acquisition dramatically changes your role and priorities. You need to understand whether this is part of your mandate or a surprise. Option 2 shows you're thinking strategically about what you're actually signing up for."}]}];

function renderContent(text, styles, c) {
  if (!text) return null;

  function renderInline(str) {
    // Handle **bold** inline
    var parts = str.split(/\*\*(.*?)\*\*/g);
    return parts.map(function(part, j) {
      return j % 2 === 1
        ? React.createElement('strong', { key: j, style: { color: c.headingText, fontWeight: 700 } }, part)
        : part;
    });
  }

  function renderAccentHeader(str) {
    return React.createElement('strong', { style: { color: c.accent, fontWeight: 700 } }, str);
  }

  // Split into paragraphs by double newline
  var paragraphs = text.split(/\n\n+/);
  var elements = [];
  var listBuffer = [];

  function flushList() {
    if (listBuffer.length > 0) {
      elements.push(
        React.createElement('ul', { key: 'ul-' + elements.length, style: { margin: '12px 0', paddingLeft: '24px', listStyleType: 'disc' } },
          ...listBuffer.map(function(item, li) {
            return React.createElement('li', { key: li, style: { ...styles.bodyText, marginBottom: '8px', display: 'list-item' } }, ...renderInline(item));
          })
        )
      );
      listBuffer = [];
    }
  }

  for (var p = 0; p < paragraphs.length; p++) {
    var para = paragraphs[p].trim();
    if (!para) continue;

    // Check if paragraph is a bullet list (lines starting with -)
    var lines = para.split('\n');
    var isList = lines.every(function(l) { return l.trim().indexOf('- ') === 0 || l.trim() === ''; });
    
    if (isList && lines.some(function(l) { return l.trim().indexOf('- ') === 0; })) {
      flushList();
      var items = lines.filter(function(l) { return l.trim().indexOf('- ') === 0; }).map(function(l) { return l.trim().substring(2); });
      items.forEach(function(item) { listBuffer.push(item); });
      flushList();
      continue;
    }

    // Check if any lines are bullet items mixed with text
    var hasBullets = lines.some(function(l) { return l.trim().indexOf('- ') === 0; });
    if (hasBullets) {
      flushList();
      // Mixed content: render text lines as paragraphs, bullet lines as list
      for (var ln = 0; ln < lines.length; ln++) {
        var line = lines[ln].trim();
        if (!line) continue;
        if (line.indexOf('- ') === 0) {
          listBuffer.push(line.substring(2));
        } else {
          flushList();
          // Check for bold header pattern: **Header:** or **Header**:
          var headerMatch = line.match(/^\*\*([^*]+)\*\*:?\s*(.*)/);
          if (headerMatch) {
            var headerText = headerMatch[1];
            var rest = headerMatch[2] || '';
            var el = React.createElement('p', { key: 'p-' + elements.length, style: { ...styles.bodyText, marginBottom: '16px' } },
              renderAccentHeader(headerText),
              (rest && !headerText.endsWith(':')) ? ': ' : (rest ? ' ' : ''),
              ...renderInline(rest)
            );
            elements.push(el);
          } else {
            elements.push(
              React.createElement('p', { key: 'p-' + elements.length, style: { ...styles.bodyText, marginBottom: '8px' } }, ...renderInline(line))
            );
          }
        }
      }
      flushList();
      continue;
    }

    flushList();

    // Regular paragraph - check if it's a bold header section
    var headerMatch = para.match(/^\*\*([^*]+)\*\*:?\s*([\s\S]*)/);
    if (headerMatch) {
      var headerText = headerMatch[1];
      var rest = headerMatch[2] || '';
      // Split rest by single newlines for line breaks
      var restLines = rest.split('\n').filter(function(l) { return l.trim(); });
      if (restLines.length <= 1) {
        elements.push(
          React.createElement('p', { key: 'p-' + elements.length, style: { ...styles.bodyText, marginBottom: '24px' } },
            renderAccentHeader(headerText),
            (rest.trim() && !headerText.endsWith(':')) ? ': ' : (rest.trim() ? ' ' : ''),
            ...renderInline(rest.trim())
          )
        );
      } else {
        // Header with multi-line content
        elements.push(
          React.createElement('p', { key: 'p-' + elements.length, style: { ...styles.bodyText, marginBottom: '8px' } },
            renderAccentHeader(headerText),
            (restLines[0].trim() && !headerText.endsWith(':')) ? ': ' : (restLines[0].trim() ? ' ' : ''),
            ...renderInline(restLines[0].trim())
          )
        );
        for (var rl = 1; rl < restLines.length; rl++) {
          var rl_line = restLines[rl].trim();
          if (rl_line.indexOf('- ') === 0) {
            listBuffer.push(rl_line.substring(2));
          } else {
            flushList();
            elements.push(
              React.createElement('p', { key: 'p-' + elements.length, style: { ...styles.bodyText, marginBottom: '8px' } }, ...renderInline(rl_line))
            );
          }
        }
        flushList();
      }
    } else {
      // Plain paragraph
      elements.push(
        React.createElement('p', { key: 'p-' + elements.length, style: { ...styles.bodyText, marginBottom: '20px' } }, ...renderInline(para.replace(/\n/g, ' ')))
      );
    }
  }

  flushList();
  return elements;
}

function calculateProgress(state) {
  const totalModules = modules.length;
  const completedModules = modules.filter(mod => state[mod.id]?.quizPassed).length;
  return totalModules > 0 ? Math.round((completedModules / totalModules) * 100) : 0;
}

function getTotalMinutes(mods) {
  return mods.reduce((acc, mod) => acc + (mod.estimatedMinutes || 0), 0);
}

function getStatusIcon(moduleId, state) {
  const moduleState = state[moduleId];
  if (!moduleState) return '○';
  if (moduleState.quizPassed) return '✓';
  if (moduleState.completedSections && moduleState.completedSections.length > 0) return '◆';
  return '○';
}

// ============================================================================
// GitHub Sync
// ============================================================================

const ghRepo = "mg00511/exec-interview-course";
const ghFile = "progress.json";

function githubSync(token, progress) {
  var headers = { "Authorization": "token " + token, "Accept": "application/vnd.github+json" };
  return fetch("https://api.github.com/repos/" + ghRepo + "/contents/" + ghFile, { headers: headers })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(existing) {
      var body = {
        message: "Sync progress",
        content: btoa(JSON.stringify(progress, null, 2))
      };
      if (existing && existing.sha) body.sha = existing.sha;
      return fetch("https://api.github.com/repos/" + ghRepo + "/contents/" + ghFile, {
        method: "PUT", headers: headers, body: JSON.stringify(body)
      });
    })
    .then(function(r) { return r.ok; })
    .catch(function() { return false; });
}

function githubLoad(token) {
  return fetch("https://api.github.com/repos/" + ghRepo + "/contents/" + ghFile, {
    headers: { "Authorization": "token " + token, "Accept": "application/vnd.github+json" }
  })
  .then(function(r) { return r.ok ? r.json() : null; })
  .then(function(data) {
    if (data && data.content) return JSON.parse(atob(data.content));
    return null;
  })
  .catch(function() { return null; });
}
